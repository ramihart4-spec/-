<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مجموعة غرزالدين - نظام متكامل</title>
<link rel="icon" id="dynamicFavicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💰%3C/text%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a; --card:#1e2330; --card2:#242838;
    --accent:#ff6b35; --gold:#f5c518; --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
    --text:#f0f2ff; --text2:#8b92a8; --border:#2a2f3e; --glow:rgba(255,107,53,0.3);
  }
  body{font-family:'system-ui', 'Segoe UI', 'Tahoma', sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .screen{display:none;min-height:100vh}
  .screen.active{display:block}
  #loginScreen.active{display:flex;align-items:center;justify-content:center;background:var(--bg)}
  #appScreen.active{display:flex;flex-direction:column}
  /* ... نفس الأنماط السابقة مع تعديلات ... */
  .bottom-nav .bn-item{font-size:14px; font-weight:800; gap:5px}
  .tb-icon-btn{width:36px;height:36px}
  .tb-icon-btn svg{width:20px;height:20px}
  /* أنماط إضافية */
  .pc-img{height:160px;}
  .pc-details{font-size:12px}
  .btn-add-to-cart{background:var(--blue)}
  .cart-item .qty input{width:60px; background:var(--bg3); color:white; border-radius:8px; padding:4px}
  .wallet-table{width:100%; border-collapse:collapse}
  .wallet-table th,.wallet-table td{padding:8px; border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<!-- شاشة الدخول (مختصرة للاختصار) ... -->
<div id="loginScreen" class="screen active">
<div class="login-wrap">
<div class="login-card">
  <div class="logo-wrap">
    <div class="logo-icon" id="loginLogoIcon"><span>🏢</span></div>
    <div class="logo-name">مجموعة غرزالدين</div>
    <div class="logo-sub">نظام متكامل - صورة وشعار خاص</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('admin')">👑 مدير عام</button>
    <button class="tab-btn" onclick="setTab('branchMgr')">🏢 رئيس فرع</button>
    <button class="tab-btn" onclick="setTab('deptMgr')">📂 رئيس قسم</button>
    <button class="tab-btn" onclick="setTab('emp')">🧑‍💼 موظف</button>
    <button class="tab-btn" onclick="setTab('guest')">🛒 تسوّق</button>
  </div>
  <div class="inp-wrap"><input id="lUser" placeholder="اسم المستخدم"></div>
  <div class="inp-wrap" id="lPassWrap"><input id="lPass" type="password" placeholder="كلمة المرور"></div>
  <div><input type="checkbox" id="rememberMe"> <label>تذكّرني</label></div>
  <button class="btn-enter" onclick="login()">دخول ←</button>
  <div class="err" id="lErr"></div>
  <div class="hint">
    <strong>المستخدمون التجريبيون:</strong><br>
    مدير عام: admin / admin123<br>
    رئيس فرع أول البلد: oldtown / 123<br>
    رئيس فرع القلعة: castle / 123<br>
    رئيس فرع السوق: souk / 123<br>
    رئيس قسم ملابس: clothes / 123<br>
    موظف عادي (يتبع رئيس فرع أول البلد): emp1 / emp123
  </div>
</div>
</div>
</div>

<!-- شاشة التطبيق -->
<div id="appScreen" class="screen">
  <div class="topbar">
    <div class="tb-brand" id="appLogoArea"><span>🏢</span><span>غرزالدين</span></div>
    <div class="tb-actions">
      <button class="tb-icon-btn wa" id="whatsappBtn" onclick="openWA()">
        <svg viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.533 5.845L.057 23.492c-.083.334.239.632.568.527l5.845-1.867A11.948 11.948 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
      </button>
      <button class="tb-icon-btn" id="mapBtn" onclick="openGPS()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
      <button class="tb-icon-btn exit" onclick="logout()">🚪</button>
    </div>
  </div>
  <div class="content">
    <div class="panel active" id="pStore"></div>
    <div class="panel" id="pCart"></div>
    <div class="panel" id="pProducts"></div>
    <div class="panel" id="pInventory"></div>
    <div class="panel" id="pReports"></div>
    <div class="panel" id="pWallet"></div>
    <div class="panel" id="pEmployees"></div>
    <div class="panel" id="pSettings"></div>
  </div>
  <div class="bottom-nav">
    <button class="bn-item" data-panel="pStore">🏠 الرئيسية</button>
    <button class="bn-item" data-panel="pCart">🛒 السلة</button>
    <button class="bn-item" data-panel="pProducts">📋 منتجات</button>
    <button class="bn-item" data-panel="pInventory">📦 المخزون</button>
    <button class="bn-item" data-panel="pReports">📊 تقارير</button>
    <button class="bn-item" data-panel="pWallet">💰 محفظة</button>
    <button class="bn-item" data-panel="pEmployees">👥 موظفون</button>
    <button class="bn-item" data-panel="pSettings">⚙️ إعدادات</button>
  </div>
</div>

<script>
// ------------------- البيانات الأساسية -------------------
const branchesData = {
  oldtown: { name: 'أول البلد', address: 'مفرق نص البلد - بيت السيد رجا غرزالدين', categories: ['مواد غذائية', 'بهارات', 'مكسرات', 'ألعاب', 'ألبان'] },
  castle: { name: 'حارة القلعة', address: 'بيت السيد رافع هلال - غرزالدين', categories: ['مواد غذائية', 'بهارات', 'مكسرات', 'ألعاب', 'ألبان'] },
  souk: { name: 'السوق', address: 'دخلة الفرن الخاص - الطابق الأرضي', categories: ['مواد غذائية', 'ملابس', 'أحذية', 'ميك أب', 'عطور', 'ألعاب', 'أدوات منزلية', 'بهارات', 'مكسرات', 'ألبان', 'هدايا'] }
};
let branches = Object.keys(branchesData).map(id => ({ id, name: branchesData[id].name, address: branchesData[id].address }));
let allCategories = [...new Set(Object.values(branchesData).flatMap(b=>b.categories))];

// منتجات أولية
let products = JSON.parse(localStorage.getItem('products')) || (()=>{
  let initial = []; let id=1;
  let catProducts = {
    'مواد غذائية': ['أرز بسمتي', 'زيت زيتون', 'سكر'], 'بهارات': ['فلفل أسود', 'كمون'], 'مكسرات': ['كاجو', 'لوز'], 'ألعاب': ['سيارة', 'دمية'], 'ألبان': ['حليب', 'جبنة'], 'ملابس': ['قميص', 'بنطال'], 'أحذية': ['حذاء رياضي'], 'ميك أب': ['أحمر شفاه'], 'عطور': ['عطر فرنسي'], 'أدوات منزلية': ['طنجرة'], 'هدايا': ['صندوق هدايا']
  };
  for(let cat of allCategories){
    let items = catProducts[cat] || [cat];
    for(let item of items){
      let price = Math.floor(Math.random()*80)+20;
      let stock = { oldtown: 10, castle: 10, souk: 20 };
      initial.push({ id: id++, name: item, category: cat, price: price, stock: stock, image: '', description: `منتج طازج من ${cat}` });
    }
  }
  return initial;
})();

// المستخدمون مع إمكانية تعريف رئيس لكل موظف
let users = JSON.parse(localStorage.getItem('users')) || [
  { id:1, name:'المدير العام', username:'admin', password:'admin123', role:'super_admin', branchId:null, dept:null, managerUsername:null },
  { id:2, name:'رئيس فرع أول البلد', username:'oldtown', password:'123', role:'branch_manager', branchId:'oldtown', dept:null, managerUsername:'admin' },
  { id:3, name:'رئيس فرع حارة القلعة', username:'castle', password:'123', role:'branch_manager', branchId:'castle', dept:null, managerUsername:'admin' },
  { id:4, name:'رئيس فرع السوق', username:'souk', password:'123', role:'branch_manager', branchId:'souk', dept:null, managerUsername:'admin' },
  { id:5, name:'رئيس قسم ملابس', username:'clothes', password:'123', role:'dept_manager', branchId:null, dept:'ملابس', managerUsername:'admin' },
  { id:6, name:'موظف عادي (يتبع أول البلد)', username:'emp1', password:'emp123', role:'employee', branchId:'oldtown', dept:null, managerUsername:'oldtown' }
];

let sales = JSON.parse(localStorage.getItem('sales')) || [];
let currentUser = null;
let currentTab = 'admin';
let logoBase64 = localStorage.getItem('companyLogo') || '';
let faviconBase64 = localStorage.getItem('companyFavicon') || '';

// سلة التسوق
let cart = JSON.parse(localStorage.getItem('cart')) || [];

// --- دوال تحديث الشعارات ---
function updateFavicon() {
  let link = document.getElementById('dynamicFavicon');
  link.href = faviconBase64 || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💰%3C/text%3E%3C/svg%3E";
}
function updateAllLogos() {
  const loginIconDiv = document.getElementById('loginLogoIcon');
  const appBrandDiv = document.getElementById('appLogoArea');
  if (logoBase64 && logoBase64 !== '') {
    loginIconDiv.innerHTML = `<img src="${logoBase64}" style="width:100%;height:100%;object-fit:cover">`;
    appBrandDiv.innerHTML = `<img src="${logoBase64}" style="height:36px;width:36px;border-radius:8px"><span>غرزالدين</span>`;
  } else {
    loginIconDiv.innerHTML = '<span>🏢</span>';
    appBrandDiv.innerHTML = '<span>🏢</span><span>غرزالدين</span>';
  }
}
function uploadCompanyLogo() { uploadImage('logo'); }
function uploadFavicon() { uploadImage('favicon'); }
function uploadImage(type) {
  let input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    let file = e.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = (ev) => {
      if (type === 'logo') { logoBase64 = ev.target.result; localStorage.setItem('companyLogo', logoBase64); updateAllLogos(); }
      else { faviconBase64 = ev.target.result; localStorage.setItem('companyFavicon', faviconBase64); updateFavicon(); }
      showNotification(`تم تغيير ${type === 'logo' ? 'شعار' : 'أيقونة'} الشركة`);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
function showNotification(msg) { let toast = document.createElement('div'); toast.className='toast show'; toast.innerText=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(),2500); }
function saveAll() {
  localStorage.setItem('products', JSON.stringify(products));
  localStorage.setItem('users', JSON.stringify(users));
  localStorage.setItem('sales', JSON.stringify(sales));
  if(currentUser?.role === 'super_admin') renderSettings();
  renderEmployees();
  renderReports();
}

// --- دوال تحديد صلاحيات العرض بناءً على المستخدم ---
function getUserBranchId() { return currentUser?.branchId || null; }
function getUserDept() { return currentUser?.dept || null; }
function canSell() { return currentUser && (currentUser.role !== 'guest'); }
function canViewInventory() { return currentUser && (currentUser.role !== 'guest'); }
function canViewEmployees() { return currentUser?.role === 'super_admin'; }
function canViewSettings() { return currentUser?.role === 'super_admin'; }

// --- تصفية المنتجات حسب صلاحية المستخدم ---
function filterProductsByUser(productsList) {
  if(!currentUser) return [];
  if(currentUser.role === 'super_admin') return productsList;
  if(currentUser.branchId) {
    // رئيس فرع أو موظف تابع لفرع: نعرض فقط المنتجات التي توجد في هذا الفرع
    let branchCats = branchesData[currentUser.branchId]?.categories || [];
    return productsList.filter(p => branchCats.includes(p.category));
  }
  if(currentUser.dept) {
    return productsList.filter(p => p.category === currentUser.dept);
  }
  return [];
}

// --- عملية البيع عبر السلة ---
function addToCart(productId, branchId, quantity=1) {
  if(!canSell()) { showNotification('غير مصرح لك بالبيع'); return; }
  let prod = products.find(p=>p.id==productId);
  if(!prod) return;
  if(currentUser.branchId) branchId = currentUser.branchId; // تثبيت الفرع
  // تحقق من أن الفرع يدعم هذا القسم
  if(!branchesData[branchId]?.categories.includes(prod.category)) { showNotification('هذا القسم غير متوفر في هذا الفرع'); return; }
  let stock = prod.stock[branchId];
  if(stock < quantity) { showNotification(`الكمية المتاحة: ${stock}`); return; }
  let existing = cart.find(item=>item.productId==productId && item.branchId==branchId);
  if(existing) {
    if(existing.quantity + quantity > stock) { showNotification(`لا يمكن إضافة أكثر من ${stock}`); return; }
    existing.quantity += quantity;
  } else {
    cart.push({ productId, branchId, productName: prod.name, price: prod.price, quantity, category: prod.category });
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  showNotification(`تم إضافة ${prod.name} إلى السلة`);
  renderCart();
}
function removeFromCart(idx) { cart.splice(idx,1); localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); }
function updateCartQty(idx, newQty) {
  if(newQty<1) { removeFromCart(idx); return; }
  let item = cart[idx];
  let prod = products.find(p=>p.id==item.productId);
  if(prod && prod.stock[item.branchId] >= newQty) {
    item.quantity = newQty;
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  } else showNotification('الكمية غير متوفرة');
}
function checkoutCart(paymentMethod) {
  if(cart.length===0) { showNotification('السلة فارغة'); return; }
  for(let item of cart) {
    let prod = products.find(p=>p.id==item.productId);
    if(!prod || prod.stock[item.branchId] < item.quantity) {
      showNotification(`المنتج ${item.productName} غير متوفر بالكمية المطلوبة`);
      return;
    }
  }
  for(let item of cart) {
    let prod = products.find(p=>p.id==item.productId);
    prod.stock[item.branchId] -= item.quantity;
    let sale = {
      id: Date.now(), branchId: item.branchId, branchName: branches.find(b=>b.id===item.branchId).name,
      productId: item.productId, productName: item.productName, category: item.category,
      quantity: item.quantity, price: item.price, total: item.price * item.quantity,
      date: new Date().toLocaleString(), dateOnly: new Date().toISOString().slice(0,10),
      seller: currentUser.username, paymentMethod: paymentMethod
    };
    sales.unshift(sale);
  }
  saveAll();
  cart = []; localStorage.setItem('cart', JSON.stringify(cart));
  showNotification(`✅ تمت عملية البيع بنجاح (${paymentMethod==='cash'?'كاش':'دين'})`);
  renderCart(); renderStore(); renderProductsList(); renderInventory(); renderReports(); renderWallet();
}
function renderCart() {
  let container = document.getElementById('pCart');
  if(!container) return;
  if(cart.length===0) { container.innerHTML='<div class="empty">🛒 السلة فارغة</div>'; return; }
  let total = 0;
  let itemsHtml = '';
  cart.forEach((item,idx)=>{
    let itemTotal = item.price * item.quantity;
    total += itemTotal;
    itemsHtml += `<div class="cart-item" style="display:flex;gap:8px;margin-bottom:8px;background:var(--bg3);padding:8px;border-radius:12px"><div style="flex:2"><b>${item.productName}</b><br><small>${branches.find(b=>b.id===item.branchId)?.name}</small></div><div><input type="number" min="1" value="${item.quantity}" onchange="updateCartQty(${idx}, this.value)" style="width:60px"></div><div>${item.price} ل.س</div><div>${itemTotal} ل.س</div><button class="remove" style="background:var(--red);border:none;border-radius:8px;color:#fff;padding:4px 8px" onclick="removeFromCart(${idx})">✖</button></div>`;
  });
  container.innerHTML = `<div class="sec-hdr"><div class="sec-title">🛒 سلة المشتريات</div></div>${itemsHtml}<div style="margin-top:16px;background:var(--accent);padding:12px;border-radius:12px;text-align:center"><b>الإجمالي: ${total} ل.س</b></div><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-acc" onclick="checkoutCart('cash')">💰 كاش</button><button class="btn btn-ghost" onclick="checkoutCart('credit')">📝 دين</button></div>`;
}

// --- دوال العرض للمنتجات مع مراعاة الصلاحيات ---
function renderProductCard(p, branchId, showCartBtn=true) {
  let stockInBranch = p.stock[branchId] || 0;
  let actionBtn = '';
  if(canSell()) {
    actionBtn = `<button class="btn-add-to-cart" style="background:var(--blue);border:none;border-radius:10px;color:#fff;padding:8px;width:100%;margin-top:5px" onclick="addToCart(${p.id},'${branchId}',1)">➕ أضف للسلة</button>`;
  }
  return `<div class="pc"><div class="pc-img">${p.image?`<img src="${p.image}">`:'<span>📦</span>'}</div><div class="pc-body"><div class="pc-name">${p.name}</div><div class="pc-cat">${p.category}</div><div class="pc-price">${p.price} ل.س</div><div class="pc-details">📋 ${p.description}<br>📦 المتبقي: ${stockInBranch}</div>${actionBtn}</div></div>`;
}
function renderStore() {
  let container = document.getElementById('pStore');
  if(!container) return;
  let userBranchId = getUserBranchId();
  let availableBranches = userBranchId ? branches.filter(b=>b.id===userBranchId) : branches;
  let selectedBranch = localStorage.getItem('storeBranch') || (availableBranches[0]?.id || 'oldtown');
  let branchInfo = branches.find(b=>b.id===selectedBranch);
  let availableDepts = branchesData[selectedBranch]?.categories || [];
  let selectedDept = localStorage.getItem('storeDept') || 'الكل';
  container.innerHTML = `<div style="background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px;text-align:center"><h2>أهلاً وسهلاً</h2><p>اختر الفرع والقسم</p><div class="branch-buttons" id="branchButtons"></div>${branchInfo?`<div class="branch-address">📍 ${branchInfo.address}</div>`:''}<div class="dept-buttons" id="deptButtons"></div><div class="search-box"><input id="storeSearch" placeholder="🔍 بحث"></div><div class="pg" id="storeGrid"></div></div>`;
  document.getElementById('branchButtons').innerHTML = availableBranches.map(b=>`<button class="branch-btn ${selectedBranch===b.id?'active':''}" data-branch="${b.id}">${b.name}</button>`).join('');
  document.querySelectorAll('#branchButtons .branch-btn').forEach(btn=>btn.addEventListener('click',()=>{ localStorage.setItem('storeBranch', btn.dataset.branch); renderStore(); }));
  document.getElementById('deptButtons').innerHTML = `<button class="dept-btn ${selectedDept==='الكل'?'active':''}" data-dept="الكل">الكل</button>`+availableDepts.map(d=>`<button class="dept-btn ${selectedDept===d?'active':''}" data-dept="${d}">${d}</button>`).join('');
  document.querySelectorAll('#deptButtons .dept-btn').forEach(btn=>btn.addEventListener('click',()=>{ localStorage.setItem('storeDept', btn.dataset.dept); renderStore(); }));
  let searchInput = document.getElementById('storeSearch');
  const render = () => {
    let search = searchInput.value.toLowerCase();
    let filtered = products.filter(p => (selectedDept==='الكل' || p.category===selectedDept) && (p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search)) && branchesData[selectedBranch].categories.includes(p.category));
    filtered = filterProductsByUser(filtered);
    document.getElementById('storeGrid').innerHTML = filtered.length ? filtered.map(p=>renderProductCard(p,selectedBranch,true)).join('') : '<div class="empty">لا توجد منتجات</div>';
  };
  searchInput.addEventListener('input', render);
  render();
}
function renderProductsList() {
  let container = document.getElementById('pProducts');
  if(!container) return;
  let userDept = getUserDept();
  let availableDepts = userDept ? [userDept] : allCategories;
  let selectedDept = localStorage.getItem('prodDept') || 'الكل';
  let selectedBranch = getUserBranchId() || 'oldtown';
  container.innerHTML = `<div class="sec-hdr"><div class="sec-title">📋 جميع المنتجات</div></div><div class="dept-buttons" id="prodDeptButtons"></div><div class="search-box"><input id="prodSearch" placeholder="🔍 بحث"></div><div class="pg" id="prodGrid"></div>`;
  document.getElementById('prodDeptButtons').innerHTML = `<button class="dept-btn ${selectedDept==='الكل'?'active':''}" data-dept="الكل">الكل</button>`+availableDepts.map(d=>`<button class="dept-btn ${selectedDept===d?'active':''}" data-dept="${d}">${d}</button>`).join('');
  document.querySelectorAll('#prodDeptButtons .dept-btn').forEach(btn=>btn.addEventListener('click',()=>{ localStorage.setItem('prodDept', btn.dataset.dept); renderProductsList(); }));
  let searchInput = document.getElementById('prodSearch');
  const render = () => {
    let search = searchInput.value.toLowerCase();
    let filtered = products.filter(p => (selectedDept==='الكل' || p.category===selectedDept) && (p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search)));
    filtered = filterProductsByUser(filtered);
    document.getElementById('prodGrid').innerHTML = filtered.length ? filtered.map(p=>renderProductCard(p,selectedBranch,true)).join('') : '<div class="empty">لا توجد منتجات</div>';
  };
  searchInput.addEventListener('input', render);
  render();
}
function renderInventory() {
  let container = document.getElementById('pInventory');
  if(!container) return;
  if(!canViewInventory()) { container.innerHTML='<div class="empty">غير مصرح لك بالوصول</div>'; return; }
  let canEdit = (currentUser.role === 'super_admin' || currentUser.role === 'branch_manager');
  container.innerHTML = `<div class="sec-hdr"><div class="sec-title">📦 المخزون والجرد</div>${canEdit ? '<button class="btn btn-acc btn-sm" onclick="openProductModal()">+ منتج</button>' : ''}</div><div class="search-box"><input id="invSearch" placeholder="🔍 بحث"></div><div class="inv-grid" id="invGrid"></div>`;
  let searchInput = document.getElementById('invSearch');
  const render = () => {
    let search = searchInput.value.toLowerCase();
    let filtered = products.filter(p => p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search));
    filtered = filterProductsByUser(filtered);
    let grid = document.getElementById('invGrid');
    if(filtered.length===0) { grid.innerHTML='<div class="empty">لا توجد نتائج</div>'; return; }
    grid.innerHTML = filtered.map(p => {
      let stockDisplay = '';
      if (currentUser.role === 'super_admin') stockDisplay = `أول البلد:${p.stock.oldtown} القلعة:${p.stock.castle} السوق:${p.stock.souk}`;
      else if (currentUser.branchId) stockDisplay = `المتبقي: ${p.stock[currentUser.branchId]}`;
      else stockDisplay = `أول البلد:${p.stock.oldtown} القلعة:${p.stock.castle} السوق:${p.stock.souk}`;
      let fillPercent = currentUser.branchId ? (p.stock[currentUser.branchId]/30)*100 : ((p.stock.oldtown+p.stock.castle+p.stock.souk)/90)*100;
      return `<div class="inv-card"><div class="inv-top"><div class="inv-emoji">${p.image?`<img src="${p.image}">`:'📦'}</div><div><b>${p.name}</b><br><small>${p.category}</small></div></div><div class="inv-bar"><div class="inv-fill" style="width:${fillPercent}%; background:${fillPercent<20?'var(--red)':'var(--green)'}"></div></div><div>${stockDisplay}</div>${canEdit ? `<div><button class="btn btn-sm btn-ghost" onclick="editProduct(${p.id})">تعديل</button> <button class="btn btn-sm btn-red" onclick="deleteProduct(${p.id})">حذف</button></div>` : ''}</div>`;
    }).join('');
  };
  searchInput.addEventListener('input', render);
  render();
}
function openProductModal(prod=null) { /* ... الحفاظ على نفس الوظيفة ... */ 
  let modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `<div class="modal-content"><h3>${prod?'تعديل':'إضافة'} منتج</h3>
    <div class="fg"><label>الاسم</label><input id="pName" value="${prod?.name||''}"></div>
    <div class="fg"><label>القسم</label><select id="pCat">${allCategories.map(c=>`<option ${prod?.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fg"><label>السعر (ل.س)</label><input id="pPrice" type="number" value="${prod?.price||0}"></div>
    <div class="fg"><label>الوصف</label><input id="pDesc" value="${prod?.description||''}"></div>
    <div class="fg"><label>مخزون أول البلد</label><input id="pStockOld" type="number" value="${prod?.stock?.oldtown||0}"></div>
    <div class="fg"><label>مخزون القلعة</label><input id="pStockCastle" type="number" value="${prod?.stock?.castle||0}"></div>
    <div class="fg"><label>مخزون السوق</label><input id="pStockSouk" type="number" value="${prod?.stock?.souk||0}"></div>
    <div class="fg"><label>صورة</label><button type="button" id="uploadImageBtn" class="btn btn-ghost">رفع صورة</button><input type="hidden" id="pImage" value="${prod?.image||''}"><div id="imagePreview">${prod?.image?`<img src="${prod.image}" style="max-width:100px">`:''}</div></div>
    <div class="modal-actions"><button class="btn btn-acc" id="saveProductBtn">حفظ</button><button class="btn btn-red" id="closeModalBtn">إلغاء</button></div></div>`;
  document.body.appendChild(modal);
  modal.classList.add('active');
  document.getElementById('uploadImageBtn').onclick = () => {
    let input = document.createElement('input'); input.type='file'; input.accept='image/*';
    input.onchange = e => {
      let file = e.target.files[0]; if(!file) return;
      let reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('pImage').value = ev.target.result;
        document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}" style="max-width:100px">`;
        showNotification('تم تحميل الصورة');
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };
  document.getElementById('saveProductBtn').onclick = () => {
    let name = document.getElementById('pName').value;
    let cat = document.getElementById('pCat').value;
    let price = parseFloat(document.getElementById('pPrice').value);
    let desc = document.getElementById('pDesc').value;
    let old = parseInt(document.getElementById('pStockOld').value);
    let castle = parseInt(document.getElementById('pStockCastle').value);
    let souk = parseInt(document.getElementById('pStockSouk').value);
    let image = document.getElementById('pImage').value;
    if(!name) { showNotification('اسم المنتج مطلوب'); return; }
    if(prod) { prod.name=name; prod.category=cat; prod.price=price; prod.description=desc; prod.stock={ oldtown:old, castle:castle, souk:souk }; prod.image=image; }
    else products.push({ id:Date.now(), name, category:cat, price, stock:{ oldtown:old, castle:castle, souk:souk }, image, description:desc });
    saveAll(); renderInventory(); renderStore(); renderProductsList(); renderReports();
    modal.remove();
    showNotification('تم حفظ المنتج');
  };
  document.getElementById('closeModalBtn').onclick = () => modal.remove();
}
function editProduct(id) { openProductModal(products.find(p=>p.id==id)); }
function deleteProduct(id) { if(confirm('حذف المنتج؟')) { products=products.filter(p=>p.id!=id); saveAll(); renderInventory(); renderStore(); renderProductsList(); renderReports(); showNotification('تم الحذف'); } }
function renderWallet() {
  let container = document.getElementById('pWallet');
  if(!container) return;
  let branchTotals = {}, deptTotals = {};
  branches.forEach(b=>{ branchTotals[b.id]={cash:0,credit:0}; });
  allCategories.forEach(c=>{ deptTotals[c]={cash:0,credit:0}; });
  sales.forEach(s=>{
    if(branchTotals[s.branchId]) branchTotals[s.branchId][s.paymentMethod] += s.total;
    if(deptTotals[s.category]) deptTotals[s.category][s.paymentMethod] += s.total;
  });
  let branchHtml = `<div class="mini-card"><div class="mini-card-title">🏢 الأرصدة حسب الفرع (ل.س)</div><table class="wallet-table"><thead><th>الفرع</th><th>كاش</th><th>دين</th><th>الإجمالي</th></thead><tbody>`;
  branches.forEach(b=>{ let cash=branchTotals[b.id].cash, credit=branchTotals[b.id].credit; branchHtml+=`<tr><td>${b.name}</td><td>${cash}</td><td>${credit}</td><td>${cash+credit}</td></tr>`; });
  branchHtml+=`</tbody></table></div><div class="mini-card"><div class="mini-card-title">📂 الأرصدة حسب القسم (ل.س)</div><table class="wallet-table"><thead><th>القسم</th><th>كاش</th><th>دين</th><th>الإجمالي</th></thead><tbody>`;
  allCategories.forEach(c=>{ let cash=deptTotals[c].cash, credit=deptTotals[c].credit; branchHtml+=`<tr><td>${c}</td><td>${cash}</td><td>${credit}</td><td>${cash+credit}</td></tr>`; });
  branchHtml+=`</tbody></table></div>`;
  container.innerHTML = `<div class="sec-hdr"><div class="sec-title">💰 المحفظة المالية</div></div>${branchHtml}`;
}
function renderReports() {
  let container = document.getElementById('pReports');
  if(!container) return;
  let adminBtns = (currentUser.role === 'super_admin') ? `<button class="btn btn-acc btn-sm" onclick="uploadCompanyLogo()">🖼️ شعار الشركة</button> <button class="btn btn-acc btn-sm" onclick="uploadFavicon()">🌐 أيقونة المتصفح</button>` : '';
  container.innerHTML = `${adminBtns}<div class="sec-hdr"><div class="sec-title">📊 التقارير</div><button class="btn btn-ghost btn-sm" onclick="renderReports()">تحديث</button></div>
    <div class="filter-bar"><select id="reportBranchFilter"><option value="all">جميع الفروع</option>${branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select>
    <select id="reportDeptFilter"><option value="all">جميع الأقسام</option>${allCategories.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
    <div id="reportStats"></div><div id="salesTable"></div>`;
  applyReportFilters();
}
function applyReportFilters() {
  let branchFilter = document.getElementById('reportBranchFilter').value;
  let deptFilter = document.getElementById('reportDeptFilter').value;
  let filtered = [...sales];
  if(currentUser.branchId) filtered = filtered.filter(s=>s.branchId===currentUser.branchId);
  if(currentUser.dept) filtered = filtered.filter(s=>s.category===currentUser.dept);
  if(branchFilter!=='all') filtered = filtered.filter(s=>s.branchId===branchFilter);
  if(deptFilter!=='all') filtered = filtered.filter(s=>s.category===deptFilter);
  let today = new Date().toISOString().slice(0,10);
  let todaySales = filtered.filter(s=>s.dateOnly===today);
  let totalToday = todaySales.reduce((a,b)=>a+b.total,0);
  let itemsToday = todaySales.reduce((a,b)=>a+b.quantity,0);
  let totalAll = filtered.reduce((a,b)=>a+b.total,0);
  document.getElementById('reportStats').innerHTML = `<div class="stats-row"><div class="stat"><div class="stat-val">${totalToday}</div><div>مبيعات اليوم</div></div><div class="stat"><div class="stat-val">${itemsToday}</div><div>قطع اليوم</div></div><div class="stat"><div class="stat-val">${totalAll}</div><div>إجمالي المبيعات</div></div></div>`;
  let html = `<table class="mini-table"><thead><th>التاريخ</th><th>الفرع</th><th>القسم</th><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th>الدفع</th><th>البائع</th></thead><tbody>`;
  if(filtered.length===0) html+=`<tr><td colspan="9">لا توجد مبيعات</td></tr>`;
  else filtered.slice(0,100).forEach(s=>{ html+=`<tr><td>${s.date}</td><td>${s.branchName}</td><td>${s.category}</td><td>${s.productName}</td><td>${s.quantity}</td><td>${s.price}</td><td>${s.total}</td><td>${s.paymentMethod==='cash'?'كاش':'دين'}</td><td>${s.seller}</td></tr>`; });
  html+=`</tbody></table>`;
  document.getElementById('salesTable').innerHTML = html;
}
function renderEmployees() {
  let container = document.getElementById('pEmployees');
  if(!container) return;
  if(!canViewEmployees()) { container.innerHTML='<div class="empty">غير مصرح لك بالوصول</div>'; return; }
  container.innerHTML = `<div class="sec-hdr"><div class="sec-title">👥 المستخدمون</div><button class="btn btn-acc btn-sm" onclick="openUserModal()">+ مستخدم</button></div><div class="emp-grid" id="empGrid"></div>`;
  let grid = document.getElementById('empGrid');
  grid.innerHTML = users.map(u=>`<div class="emp-card"><div><b>${u.name}</b> (@${u.username}) - ${u.role} ${u.branchId?`فرع:${branches.find(b=>b.id===u.branchId)?.name}`:''} ${u.dept?`قسم:${u.dept}`:''} ${u.managerUsername?`(يتبع ${u.managerUsername})`:''}</div><button class="btn btn-sm btn-red" onclick="deleteUser(${u.id})">حذف</button></div>`).join('');
}
function openUserModal() {
  let modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `<div class="modal-content"><h3>إضافة مستخدم</h3>
    <div class="fg"><label>الاسم</label><input id="fullName"></div>
    <div class="fg"><label>اسم المستخدم</label><input id="userName"></div>
    <div class="fg"><label>كلمة المرور</label><input id="userPass" type="password"></div>
    <div class="fg"><label>الصلاحية</label><select id="userRole"><option>super_admin</option><option>branch_manager</option><option>dept_manager</option><option>employee</option></select></div>
    <div class="fg" id="branchField" style="display:none"><label>الفرع</label><select id="userBranch">${branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></div>
    <div class="fg" id="deptField" style="display:none"><label>القسم</label><select id="userDept">${allCategories.map(c=>`<option>${c}</option>`).join('')}</select></div>
    <div class="fg" id="managerField" style="display:none"><label>المدير المسؤول</label><select id="userManager"><option value="">لا يوجد</option>${users.filter(u=>u.role==='branch_manager'||u.role==='dept_manager').map(u=>`<option value="${u.username}">${u.name}</option>`).join('')}</select></div>
    <div class="modal-actions"><button class="btn btn-acc" id="saveUserBtn">حفظ</button><button class="btn btn-red" id="closeUserModal">إلغاء</button></div></div>`;
  document.body.appendChild(modal);
  modal.classList.add('active');
  let roleSelect = document.getElementById('userRole');
  let branchDiv = document.getElementById('branchField');
  let deptDiv = document.getElementById('deptField');
  let managerDiv = document.getElementById('managerField');
  roleSelect.onchange = () => {
    let val = roleSelect.value;
    branchDiv.style.display = (val==='branch_manager'||val==='employee')?'block':'none';
    deptDiv.style.display = (val==='dept_manager')?'block':'none';
    managerDiv.style.display = (val==='employee')?'block':'none';
  };
  roleSelect.dispatchEvent(new Event('change'));
  document.getElementById('saveUserBtn').onclick = () => {
    let name = document.getElementById('fullName').value;
    let username = document.getElementById('userName').value;
    let password = document.getElementById('userPass').value;
    let role = roleSelect.value;
    let branchId = (role==='branch_manager'||role==='employee')?document.getElementById('userBranch').value:null;
    let dept = (role==='dept_manager')?document.getElementById('userDept').value:null;
    let managerUsername = (role==='employee')?document.getElementById('userManager').value:null;
    if(!name||!username||!password){ showNotification('املأ الحقول'); return; }
    users.push({ id:Date.now(), name, username, password, role, branchId, dept, managerUsername });
    saveAll(); modal.remove(); renderEmployees(); showNotification('تمت الإضافة');
  };
  document.getElementById('closeUserModal').onclick = () => modal.remove();
}
function deleteUser(id) { if(confirm('حذف المستخدم؟')){ users=users.filter(u=>u.id!=id); saveAll(); renderEmployees(); showNotification('تم الحذف'); } }
function renderSettings() { /* ... إدارة الفروع والأقسام ... */ 
  let container = document.getElementById('pSettings');
  if(!container) return;
  if(!canViewSettings()) { container.innerHTML='<div class="empty">غير مصرح</div>'; return; }
  container.innerHTML = `<div class="sec-hdr"><div class="sec-title">⚙️ إعدادات الفروع والأقسام</div></div><div id="branchesSettings"></div><div id="catsSettings"></div>`;
  let branchesHtml = `<div class="mini-card"><div class="mini-card-title">الفروع</div><table class="wallet-table"><thead><th>الاسم</th><th>العنوان</th><th>الأقسام</th><th></th></thead><tbody>`;
  branches.forEach(b=>{
    branchesHtml += `<tr><td><input type="text" id="branchName_${b.id}" value="${b.name}"></td><td><input type="text" id="branchAddr_${b.id}" value="${b.address}"></td><td>${branchesData[b.id].categories.join(', ')}</td><td><button onclick="updateBranch('${b.id}')">حفظ</button> <button onclick="deleteBranch('${b.id}')">حذف</button></td></tr>`;
  });
  branchesHtml += `</tbody></table><button class="btn btn-acc btn-sm" onclick="addBranch()">+ فرع</button></div>`;
  document.getElementById('branchesSettings').innerHTML = branchesHtml;
  let catsHtml = `<div class="mini-card"><div class="mini-card-title">الأقسام العامة</div><div class="chips">${allCategories.map(c=>`<span class="chip">${c} <button onclick="deleteCategory('${c}')">✖</button></span>`).join('')}</div><button class="btn btn-acc btn-sm" onclick="addCategory()">+ قسم</button></div>`;
  document.getElementById('catsSettings').innerHTML = catsHtml;
}
function updateBranch(id) {
  let newName = document.getElementById(`branchName_${id}`).value;
  let newAddr = document.getElementById(`branchAddr_${id}`).value;
  let branch = branches.find(b=>b.id===id);
  if(branch) { branch.name = newName; branch.address = newAddr; branchesData[id].name = newName; branchesData[id].address = newAddr; saveAll(); renderSettings(); showNotification('تم التحديث'); }
}
function addBranch() { let id=prompt('معرف الفرع'); let name=prompt('الاسم'); let addr=prompt('العنوان'); let cats=prompt('الأقسام (مفصولة بفواصل)'); if(id && name && !branches.find(b=>b.id===id)){ branches.push({id,name,address:addr}); branchesData[id]={name,address:addr, categories: cats.split(',')}; saveAll(); renderSettings(); } }
function deleteBranch(id) { if(confirm('حذف الفرع؟')){ branches=branches.filter(b=>b.id!=id); delete branchesData[id]; saveAll(); renderSettings(); } }
function addCategory() { let cat=prompt('اسم القسم'); if(cat && !allCategories.includes(cat)){ allCategories.push(cat); saveAll(); renderSettings(); } }
function deleteCategory(cat) { if(confirm('حذف القسم؟')){ let idx=allCategories.indexOf(cat); if(idx!==-1) allCategories.splice(idx,1); saveAll(); renderSettings(); } }

// دوال التنقل والشاشات
function setActivePanel(panelId) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.bn-item[data-panel="${panelId}"]`).classList.add('active');
  if(panelId === 'pStore') renderStore();
  else if(panelId === 'pCart') renderCart();
  else if(panelId === 'pProducts') renderProductsList();
  else if(panelId === 'pInventory') renderInventory();
  else if(panelId === 'pReports') renderReports();
  else if(panelId === 'pWallet') renderWallet();
  else if(panelId === 'pEmployees') renderEmployees();
  else if(panelId === 'pSettings') renderSettings();
}
document.querySelectorAll('.bn-item').forEach(btn => btn.addEventListener('click', () => setActivePanel(btn.dataset.panel)));
function setTab(tab) { currentTab=tab; document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); event.target.classList.add('active'); document.getElementById('lPassWrap').style.display = (tab==='guest')?'none':'block'; }
function login() {
  let user = document.getElementById('lUser').value.trim();
  let pass = document.getElementById('lPass').value;
  let foundUser = null;
  if(currentTab === 'guest') currentUser = { username:'guest', role:'guest', branchId:null, dept:null };
  else {
    foundUser = users.find(u=>u.username===user && u.password===pass);
    if(!foundUser) { document.getElementById('lErr').style.display='block'; return; }
    currentUser = foundUser;
  }
  if(document.getElementById('rememberMe').checked) localStorage.setItem('savedUser', JSON.stringify({username:currentUser.username, role:currentUser.role, branchId:currentUser.branchId, dept:currentUser.dept}));
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  // إظهار أو إخفاء أزرار الإدارة للمدير العام
  let empNav = document.querySelector('.bn-item[data-panel="pEmployees"]');
  let setNav = document.querySelector('.bn-item[data-panel="pSettings"]');
  if(currentUser.role !== 'super_admin') { empNav.style.display = 'none'; setNav.style.display = 'none'; } else { empNav.style.display = 'flex'; setNav.style.display = 'flex'; }
  setActivePanel('pStore');
  updateAllLogos();
  updateFavicon();
}
function logout() { currentUser=null; localStorage.removeItem('savedUser'); document.getElementById('loginScreen').classList.add('active'); document.getElementById('appScreen').classList.remove('active'); }
function openWA() { window.open('https://wa.me/972599285511?text=مرحباً، أريد الاستفسار عن منتجاتكم'); }
function openGPS() { window.open('https://maps.google.com/?q=31.9474,35.2272'); }
let saved = localStorage.getItem('savedUser');
if(saved) {
  try {
    let u = JSON.parse(saved);
    if(u.username) {
      if(u.username === 'guest') currentUser = { username:'guest', role:'guest', branchId:null, dept:null };
      else currentUser = users.find(us=>us.username===u.username) || u;
      if(currentUser) {
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('appScreen').classList.add('active');
        if(currentUser.role !== 'super_admin') { document.querySelector('.bn-item[data-panel="pEmployees"]').style.display = 'none'; document.querySelector('.bn-item[data-panel="pSettings"]').style.display = 'none'; }
        setActivePanel('pStore');
        updateAllLogos();
        updateFavicon();
      }
    }
  } catch(e) {}
}
// إضافة نمط للتوست
document.head.insertAdjacentHTML('beforeend', `<style>.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card2);padding:10px 20px;border-radius:12px;z-index:999;display:none}.toast.show{display:block}</style>`);
