<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مجموعة غرزالدين التجارية | إدارة احترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-light: #F4E0A1; --black: #1A1A1A;
            --white: #FFFFFF; --gray: #F8F9FA; --red: #D90429; --green: #2B9348;
            --border: #E0E0E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--gray); color: var(--black); line-height: 1.6; }

        /* الهيدر الملكي */
        .header {
            background: var(--black); color: var(--gold);
            padding: 30px 20px; text-align: center;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header img { width: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--gold)); }
        .header h1 { font-size: 26px; font-weight: 900; letter-spacing: 1px; }

        /* شريط التنقل للفروع */
        .branch-nav {
            display: flex; overflow-x: auto; background: var(--white);
            padding: 10px; gap: 10px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .branch-item {
            min-width: 140px; padding: 12px; border-radius: 10px;
            background: var(--gray); border: 2px solid transparent;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .branch-item.active { border-color: var(--gold); background: #fffcf0; }
        .branch-item h4 { font-size: 13px; font-weight: 700; }
        .branch-item span { font-size: 10px; color: #666; }

        /* لوحة التحكم المالية */
        .dashboard {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 15px;
        }
        .stat-card {
            background: var(--white); padding: 15px; border-radius: 15px;
            border-right: 5px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-card h5 { font-size: 11px; color: #888; margin-bottom: 5px; }
        .stat-card .value { font-size: 18px; font-weight: 900; color: var(--black); }

        /* الأقسام الرئيسية */
        .main-content { padding: 0 15px 100px; }
        .section { background: var(--white); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* الجداول الذكية */
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #f1f1f1; padding: 10px; text-align: right; border-bottom: 2px solid var(--gold); }
        .data-table td { padding: 12px 10px; border-bottom: 1px solid #eee; }

        /* الأزرار الاحترافية */
        .btn { 
            padding: 10px 18px; border: none; border-radius: 8px; 
            font-weight: 700; cursor: pointer; transition: 0.2s; 
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-gold { background: var(--gold); color: var(--white); }
        .btn-black { background: var(--black); color: var(--gold); }
        .btn-red { background: var(--red); color: white; }

        /* نظام الإشعارات */
        .chat-floating {
            position: fixed; bottom: 20px; left: 20px;
            background: var(--black); color: var(--gold);
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); cursor: pointer;
        }

        /* المودال (النافذة) */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-body { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .input-group input, .input-group select { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none;
        }

        .tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .tag-pending { background: #fff3cd; color: #856404; }
        .tag-active { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <header class="header">
        <h1>مجموعة غرزالدين التجارية</h1>
        <p style="font-size: 12px; margin-top: 5px; opacity: 0.8;">نظام الإدارة المتكامل الذكي</p>
    </header>

    <div class="branch-nav" id="branchNav">
        </div>

    <div class="dashboard">
        <div class="stat-card">
            <h5>رأس المال الحالي</h5>
            <div class="value" id="statCapital">0 ل.س</div>
        </div>
        <div class="stat-card">
            <h5>صافي الأرباح</h5>
            <div class="value" id="statProfit" style="color: var(--green);">0 ل.س</div>
        </div>
    </div>

    <div class="main-content">
        <div class="section">
            <div class="section-header">
                <h3>📦 جرد المخزون</h3>
                <button class="btn btn-gold" onclick="toggleModal('prodModal', true)">+ بضاعة جديدة</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>التكلفة</th>
                            <th>المفرق</th>
                            <th>الحالة</th>
                            <th>الإجراء</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h3>💸 المالية والجرد الصارم</h3>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-black" onclick="toggleModal('expenseModal', true)">🏢 إيجارات ورواتب</button>
                <button class="btn btn-red" onclick="personalAction()">👤 سحب شخصي للمالك</button>
            </div>
        </div>
    </div>

    <div class="chat-floating" onclick="alert('جاري الاتصال بمدراء الفروع... يتم إرسال تنبيه صوتي الآن')">
        💬
    </div>

    <div class="modal" id="prodModal">
        <div class="modal-body">
            <h2 style="margin-bottom: 20px;">إضافة بضاعة للفرع</h2>
            <div class="input-group">
                <label>اسم المنتج</label>
                <input type="text" id="pName" placeholder="مثال: أرز، بهارات، ألبان...">
            </div>
            <div class="input-group">
                <label>الكمية المضافة</label>
                <input type="number" id="pQty" placeholder="0">
            </div>
            <div style="font-size: 11px; color: #666; margin-bottom: 15px;">* ملاحظة: الموظف يضيف الكمية فقط. التسعير من صلاحية المدير العام.</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-gold" style="flex: 1;" onclick="saveProduct()">حفظ في المسودة</button>
                <button class="btn btn-black" style="flex: 1;" onclick="toggleModal('prodModal', false)">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="modal" id="expenseModal">
        <div class="modal-body">
            <h2>تسجيل مصاريف تشغيلية</h2><br>
            <div class="input-group">
                <label>نوع المصروف</label>
                <select id="expType">
                    <option value="rent">إيجار محل</option>
                    <option value="salary">رواتب موظفين</option>
                    <option value="bill">كهرباء / مياه / نثريات</option>
                </select>
            </div>
            <div class="input-group">
                <label>المبلغ (ل.س)</label>
                <input type="number" id="expAmount" placeholder="0">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-red" style="flex: 1;" onclick="saveExpense()">تسجيل المصروف</button>
                <button class="btn btn-black" style="flex: 1;" onclick="toggleModal('expenseModal', false)">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        // هيكلة البيانات الاحترافية
        const BRANCH_DATA = {
            castle: { name: 'فرع القلعة', type: 'شراكة', cats: ['غذائية', 'بهارات', 'ألبان'] },
            souk_food: { name: 'فرع السوق (أ)', type: 'شراكة', cats: ['غذائية', 'مكسرات'] },
            souk_misc: { name: 'فرع السوق (ب)', type: 'خاص', cats: ['منوعات', 'ألعاب'] },
            private_hub: { name: 'مركز غرزالدين', type: 'خاص', cats: ['إدارة'] }
        };

        let currentBranch = 'castle';
        let db = JSON.parse(localStorage.getItem('gz_pro_db')) || {
            products: [],
            expenses: [],
            personal_withdrawals: []
        };

        // تشغيل النظام
        function init() {
            renderBranches();
            renderInventory();
            updateStats();
        }

        function renderBranches() {
            const nav = document.getElementById('branchNav');
            nav.innerHTML = Object.keys(BRANCH_DATA).map(key => `
                <div class="branch-item ${currentBranch === key ? 'active' : ''}" onclick="switchBranch('${key}')">
                    <h4>${BRANCH_DATA[key].name}</h4>
                    <span>${BRANCH_DATA[key].type}</span>
                </div>
            `).join('');
        }

        function switchBranch(key) {
            currentBranch = key;
            renderBranches();
            renderInventory();
            updateStats();
        }

        // جرد المخزون
        function renderInventory() {
            const body = document.getElementById('inventoryBody');
            const items = db.products.filter(p => p.branch === currentBranch);
            
            if (items.length === 0) {
                body.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:#999;">لا يوجد بضاعة في هذا الفرع حالياً</td></tr>`;
                return;
            }

            body.innerHTML = items.map(p => `
                <tr>
                    <td><b>${p.name}</b></td>
                    <td>${p.qty}</td>
                    <td>${p.cost > 0 ? p.cost.toLocaleString() : '---'}</td>
                    <td>${p.price > 0 ? p.price.toLocaleString() : '---'}</td>
                    <td><span class="tag ${p.status === 'pending' ? 'tag-pending' : 'tag-active'}">${p.status === 'pending' ? 'بانتظار التسعير' : 'نشط'}</span></td>
                    <td>
                        ${p.status === 'pending' ? 
                        `<button class="btn btn-gold" style="padding:4px 8px; font-size:10px" onclick="adminPrice(${p.id})">تسعير</button>` : 
                        `<button class="btn btn-black" style="padding:4px 8px; font-size:10px" onclick="sellItem(${p.id})">بيع</button>`}
                    </td>
                </tr>
            `).join('');
        }

        // حفظ بضاعة جديدة (صلاحية الموظف)
        function saveProduct() {
            const name = document.getElementById('pName').value;
            const qty = document.getElementById('pQty').value;

            if (!name || !qty) return alert("يرجى ملء البيانات");

            const newProd = {
                id: Date.now(),
                name: name,
                qty: parseFloat(qty),
                branch: currentBranch,
                cost: 0, price: 0,
                status: 'pending'
            };

            db.products.push(newProd);
            saveToDisk();
            toggleModal('prodModal', false);
            renderInventory();
            playTone();
        }

        // تسعير المدير العام
        function adminPrice(id) {
            const cost = prompt("سعر التكلفة (ليرة):");
            const price = prompt("سعر المبيع للمفرق (ليرة):");
            
            if (cost && price) {
                const p = db.products.find(x => x.id === id);
                p.cost = parseFloat(cost);
                p.price = parseFloat(price);
                p.status = 'active';
                saveToDisk();
                renderInventory();
                updateStats();
            }
        }

        // نظام السحب الشخصي لضبط الجرد 100%
        function personalAction() {
            const itemName = prompt("ما هو المنتج الذي سحبته لاستخدامك الشخصي؟");
            const val = prompt("أدخل قيمة التكلفة التقديرية لهذا السحب:");
            if (val) {
                db.personal_withdrawals.push({ date: new Date(), item: itemName, value: parseFloat(val), branch: currentBranch });
                saveToDisk();
                updateStats();
                alert("تم تسجيل السحب الشخصي وخصمه من أرباح الفرع لضمان دقة الجرد.");
            }
        }

        function saveExpense() {
            const amt = document.getElementById('expAmount').value;
            const type = document.getElementById('expType').value;
            if (amt) {
                db.expenses.push({ amount: parseFloat(amt), type, branch: currentBranch, date: new Date() });
                saveToDisk();
                toggleModal('expenseModal', false);
                updateStats();
            }
        }

        function updateStats() {
            let capital = 0;
            let profit = 0;

            // حساب رأس المال في الفرع الحالي
            db.products.filter(p => p.branch === currentBranch).forEach(p => {
                capital += (p.cost * p.qty);
            });

            // حساب الأرباح (تبسيطي للجرد)
            const branchExpenses = db.expenses.filter(e => e.branch === currentBranch).reduce((a,b) => a + b.amount, 0);
            const branchPersonal = db.personal_withdrawals.filter(w => w.branch === currentBranch).reduce((a,b) => a + b.value, 0);
            
            document.getElementById('statCapital').innerText = capital.toLocaleString() + " ل.س";
            // الربح الصافي = (الربح المتوقع - المصاريف - المسحوبات)
            document.getElementById('statProfit').innerText = (profit - branchExpenses - branchPersonal).toLocaleString() + " ل.س";
        }

        function saveToDisk() {
            localStorage.setItem('gz_pro_db', JSON.stringify(db));
        }

        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('active', show);
        }

        function playTone() {
            // نغمة تنبيه احترافية عند إضافة بضاعة
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        window.onload = init;
    </script>
</body>
</html>
