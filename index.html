<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>مجموعة غرزالدين التجارية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Tajawal',sans-serif}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--card:#1e2330;--card2:#242838;
  --accent:#ff6b35;--gold:#f5c518;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --text:#f0f2ff;--text2:#8b92a8;--border:#2a2f3e;
}
/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;width:100%;background:var(--bg);overflow:hidden}
.screen{display:none;width:100%;height:100%}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
#loginScreen{background:var(--bg);align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.login-card{background:var(--card);border-radius:24px;padding:24px 20px;width:100%;max-width:360px}
.logo-box{text-align:center;margin-bottom:20px}
.logo-circle{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--gold));border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:8px}
.logo-title{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.role-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:16px;background:var(--bg3);padding:4px;border-radius:12px}
.role-tab{padding:6px 2px;border:none;background:transparent;color:var(--text2);font-family:'Tajawal',sans-serif;font-size:10px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center}
.role-tab.active{background:var(--accent);color:#fff}
.field{margin-bottom:10px}
.field input{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none}
.field input:focus{border-color:var(--accent)}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.remember-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.remember-row label{font-size:12px;color:var(--text2);cursor:pointer}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#e05520);border:none;border-radius:12px;color:#fff;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
.login-hint{margin-top:14px;padding:10px;background:var(--bg3);border-radius:10px;font-size:10px;color:var(--text2);line-height:2}
.err-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none}

/* ── TOPBAR ── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 10px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-logo{display:flex;align-items:center;gap:6px}
.tb-logo-img{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.tb-logo-img img{width:100%;height:100%;object-fit:cover}
.tb-name{font-size:13px;font-weight:900;color:var(--text)}
.tb-right{display:flex;align-items:center;gap:5px}
.tb-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg3);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;position:relative;flex-shrink:0}
.tb-btn.wa{background:#25d366;color:#fff}
.tb-rate{background:var(--bg3);padding:3px 7px;border-radius:20px;font-size:9px;font-weight:800;color:var(--gold);white-space:nowrap}
.badge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;display:none}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;background:var(--bg)}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--card);border-top:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;padding:0 4px}
.bottom-nav::-webkit-scrollbar{display:none}
.bn{display:flex;flex-direction:column;align-items:center;padding:7px 10px;border:none;background:transparent;color:var(--text2);font-family:'Tajawal',sans-serif;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:54px;transition:all .2s;flex-shrink:0}
.bn .icon{font-size:18px;margin-bottom:2px}
.bn.active{color:var(--accent)}

/* ── PANELS ── */
.panel{display:none}
.panel.active{display:block}

/* ── STORE HERO ── */
.hero{background:linear-gradient(135deg,var(--card),var(--bg3));border-radius:16px;padding:16px;margin-bottom:14px;text-align:center}
.hero h2{font-size:16px;font-weight:900;margin-bottom:4px}
.hero p{font-size:11px;color:var(--text2);margin-bottom:12px}
.hero-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hero-btn{padding:9px 16px;border-radius:10px;border:none;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:5px}
.hero-btn.wa{background:#25d366;color:#fff}
.hero-btn.map{background:var(--bg3);border:1px solid var(--border);color:var(--text)}

/* ── BRANCH TABS ── */
.branch-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:4px}
.branch-tabs::-webkit-scrollbar{display:none}
.btab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.branch-addr{background:var(--bg3);border-radius:10px;padding:7px 12px;font-size:10px;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:5px}

/* ── DEPT CHIPS ── */
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── SEARCH ── */
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}

/* ── PRODUCTS GRID ── */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pc{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.pc-img{height:110px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-img .emoji{font-size:40px}
.pc-body{padding:10px}
.pc-name{font-size:12px;font-weight:800;margin-bottom:3px;line-height:1.3}
.pc-cat{font-size:10px;color:var(--text2);margin-bottom:4px}
.pc-price{font-size:14px;font-weight:900;color:var(--accent);margin-bottom:8px}
.pc-price span{font-size:9px;font-weight:500;color:var(--text2)}
.btn-cart{width:100%;padding:7px;background:var(--blue);border:none;border-radius:8px;color:#fff;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:800;cursor:pointer}
.btn-wa-prod{width:100%;padding:7px;background:#25d366;border:none;border-radius:8px;color:#fff;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:800;cursor:pointer;margin-top:4px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:900;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--text2)}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.sec-title{font-size:16px;font-weight:800}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:10px;border:none;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-acc{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text)}
.btn-gold{background:var(--gold);color:#1a1a1a}
.btn-sm{padding:5px 10px;font-size:11px}

/* ── BADGE ── */
.bdg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:800}
.bdg-green{background:rgba(34,197,94,.2);color:var(--green)}
.bdg-red{background:rgba(239,68,68,.2);color:var(--red)}
.bdg-gold{background:rgba(245,197,24,.2);color:var(--gold)}
.bdg-blue{background:rgba(59,130,246,.2);color:var(--blue)}
.bdg-acc{background:rgba(255,107,53,.2);color:var(--accent)}
.bdg-purple{background:rgba(168,85,247,.2);color:var(--purple)}

/* ── INV BAR ── */
.inv-bar{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin:6px 0}
.inv-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── CART ── */
.cart-item{background:var(--bg3);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-size:12px}
.cart-qty{width:44px;padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);text-align:center;font-family:'Tajawal',sans-serif}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px;font-size:11px}
th{background:var(--bg3);padding:8px;text-align:right;color:var(--text2);font-weight:800;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle}

/* ── EMP CARDS ── */
.emp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
.emp-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.emp-av{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.emp-actions{display:flex;gap:6px;margin-top:10px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:flex-end;justify-content:center}
.overlay.active{display:flex}
.modal-box{background:var(--card2);border-radius:24px 24px 0 0;padding:20px 16px 30px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-drag{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:900}
.modal-close{width:30px;height:30px;background:var(--bg3);border:none;border-radius:8px;color:var(--text2);cursor:pointer;font-size:14px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:800;color:var(--text2);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:13px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.fg select option{background:var(--bg3)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1;justify-content:center;padding:12px}

/* ── TOAST ── */
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:10px}
.empty h3{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}

/* ── IMG UPLOAD ── */
.img-upload-area{display:flex;align-items:center;gap:10px;margin-top:6px}
.img-preview{width:64px;height:64px;background:var(--bg3);border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;flex-shrink:0}
.img-preview img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="app">

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen" class="screen active">
<div class="login-card">
  <div class="logo-box">
    <div class="logo-circle" id="loginLogo">🏢</div>
    <div class="logo-title">مجموعة غرزالدين</div>
    <div style="font-size:11px;color:var(--text2)">التجارية</div>
  </div>
  <div class="role-tabs">
    <button class="role-tab active" onclick="setTab('admin',this)">مدير عام</button>
    <button class="role-tab" onclick="setTab('branchMgr',this)">رئيس فرع</button>
    <button class="role-tab" onclick="setTab('deptMgr',this)">رئيس قسم</button>
    <button class="role-tab" onclick="setTab('emp',this)">موظف</button>
    <button class="role-tab" onclick="setTab('guest',this)">زبون</button>
  </div>
  <div class="field"><input id="lUser" placeholder="اسم المستخدم" autocomplete="username"></div>
  <div class="field" id="lPassWrap"><input id="lPass" type="password" placeholder="كلمة المرور" autocomplete="current-password" onkeypress="if(event.key==='Enter')doLogin()"></div>
  <div class="remember-row">
    <input type="checkbox" id="remMe">
    <label for="remMe">تذكّرني</label>
  </div>
  <button class="btn-login" onclick="doLogin()">دخول ←</button>
  <div class="err-msg" id="lErr">❌ بيانات خاطئة</div>
  <div class="login-hint">
    مدير عام: admin / admin123<br>
    أول البلد: oldtown / 123<br>
    القلعة: castle / 123<br>
    السوق: souk / 123<br>
    موظف: emp1 / emp123
  </div>
</div>
</div>

<!-- ═══ APP ═══ -->
<div id="appScreen" class="screen">
  <!-- Topbar -->
  <div class="topbar">
    <div class="tb-logo">
      <div class="tb-logo-img" id="tbLogo">🏢</div>
      <div class="tb-name">غرزالدين</div>
    </div>
    <div class="tb-right">
      <button class="tb-btn wa" onclick="openWA()" title="واتساب" style="width:30px;height:30px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.533 5.845L.057 23.492c-.083.334.239.632.568.527l5.845-1.867A11.948 11.948 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
      </button>
      <button class="tb-btn" onclick="openFBMenu()" title="فيسبوك" style="width:30px;height:30px;background:#1877f2;color:#fff">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </button>
      <button class="tb-btn" onclick="openGPS()" style="width:30px;height:30px">📍</button>
      <button class="tb-btn" onclick="openMsgModal()" id="msgBtn" style="width:30px;height:30px">💬<span class="badge" id="msgBadge">0</span></button>
      <button class="tb-btn" id="dollarBtn" onclick="editRate()" style="width:30px;height:30px;background:rgba(245,197,24,.15);color:var(--gold)">💵</button>
      <button class="tb-btn" onclick="doLogout()" style="width:30px;height:30px;background:rgba(239,68,68,.2);color:var(--red)">🚪</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="mainContent">
    <div class="panel active" id="pStore"></div>
    <div class="panel" id="pCart"></div>
    <div class="panel" id="pInventory"></div>
    <div class="panel" id="pReports"></div>
    <div class="panel" id="pWallet"></div>
    <div class="panel" id="pDebt"></div>
    <div class="panel" id="pEmployees"></div>
    <div class="panel" id="pSettings"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav" id="bottomNav">
    <button class="bn active" data-p="pStore"><span class="icon">🏠</span>المتجر</button>
    <button class="bn" data-p="pCart"><span class="icon">🛒</span>السلة<span class="badge" id="cartBadge">0</span></button>
    <button class="bn" data-p="pInventory"><span class="icon">📦</span>المخزون</button>
    <button class="bn" data-p="pReports"><span class="icon">📊</span>التقارير</button>
    <button class="bn" data-p="pWallet"><span class="icon">💰</span>المحفظة</button>
    <button class="bn" data-p="pDebt"><span class="icon">📒</span>الديون</button>
    <button class="bn hidden" data-p="pEmployees" id="navEmp"><span class="icon">👥</span>الموظفون</button>
    <button class="bn hidden" data-p="pSettings" id="navSet"><span class="icon">⚙️</span>الإعدادات</button>
  </div>
</div>
</div>

<!-- ═══ MODALS ═══ -->
<!-- Product Modal -->
<div class="overlay" id="mProd">
<div class="modal-box">
  <div class="modal-drag"></div>
  <div class="modal-hdr">
    <div class="modal-title" id="mProdTitle">➕ إضافة منتج</div>
    <button class="modal-close" onclick="closeOverlay('mProd')">✕</button>
  </div>
  <div class="fg"><label>اسم المنتج</label><input id="pName"></div>
  <div class="fg"><label>القسم</label><select id="pCat"></select></div>
  <div class="fg"><label>السعر (دولار)</label><input id="pPrice" type="number"></div>
  <div class="fg"><label>الوصف</label><input id="pDesc"></div>
  <div class="fg"><label>مخزون أول البلد</label><input id="pStOld" type="number" value="0"></div>
  <div class="fg"><label>مخزون القلعة</label><input id="pStCastle" type="number" value="0"></div>
  <div class="fg"><label>مخزون السوق</label><input id="pStSouk" type="number" value="0"></div>
  <div class="fg">
    <label>صورة المنتج</label>
    <div class="img-upload-area">

function doLogin() {
  const u = document.getElementById('lUser').value.trim();

  if(loginTab==='guest') { me={id:0,name:'زبون',username:'guest',role:'زبون',branchId:null,dept:null}; launchApp(); return; }
  const found = users.find(x=>x.username===u && x.password===p);

function launchApp() {

  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('appScreen').classList.remove('active');
}

  else if(id==='pWallet') renderWallet();
  else if(id==='pDebt') renderDebt();
  else if(id==='pEmployees') renderEmployees();
  else if(id==='pSettings') renderSettings();
}

// ═══════════════ STORE ═══════════════

          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.533 5.845L.057 23.492c-.083.334.239.632.568.527l5.845-1.867A11.948 11.948 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>

function filterStoreGrid() {
  const q = (document.getElementById('storeQ')?.value||'').toLowerCase();
  const branchCats = branchesConfig[currentBranch]?.cats||[];
  let items = products.filter(p=>{
    const inBranch = branchCats.includes(p.cat);
    const inDept = currentDept==='الكل'||p.cat===currentDept;
    const inSearch = !q || p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q);
    return inBranch && inDept && inSearch;
  });
  if(me.branchId) items=items.filter(p=>branchesConfig[me.branchId]?.cats.includes(p.cat));

  const grid = document.getElementById('storeGrid');
  if(!grid) return;
  if(!items.length) { grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>لا توجد منتجات</h3></div>'; return; }
  grid.innerHTML = items.map(p=>{
    const priceLira = Math.round(p.price * exchangeRate);
    const stock = p.stock[currentBranch]||0;
    const imgEl = p.img ? `<img src="${p.img}" alt="${p.name}">` : `<span class="emoji">📦</span>`;
    const cartBtn = me.role!=='زبون' ? `<button class="btn-cart" onclick="addToCart(${p.id},'${currentBranch}')">➕ سلة</button>` : '';
    return `<div class="pc">
      <div class="pc-img">${imgEl}</div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-cat">${p.cat} | متبقي: ${stock}</div>
        <div class="pc-price">${priceLira.toLocaleString('ar-SY')} <span>ل.س</span></div>
        ${cartBtn}
        <button class="btn-wa-prod" onclick="contactProd('${p.name.replace(/'/g,`\\'`)}')">💬 واتساب</button>
      </div>
    </div>`;
  }).join('');
}

function contactProd(name) {
  const msg = encodeURIComponent(`مرحباً 👋، أريد الاستفسار عن: ${name}`);
  window.open(`https://wa.me/${PHONE_WA}?text=${msg}`,'_blank');
}

// ═══════════════ CART ═══════════════
function addToCart(prodId, branchId) {
  const prod = products.find(p=>p.id==prodId);
  if(!prod) return;
  const stock = prod.stock[branchId]||0;
  if(stock<1) { toast('❌ المنتج غير متوفر','err'); return; }
  const existing = cart.find(i=>i.prodId==prodId&&i.branchId==branchId);
  if(existing) { if(existing.qty+1>stock){toast('❌ الكمية غير كافية','err');return;} existing.qty++; }
  else cart.push({prodId,branchId,name:prod.name,price:prod.price,cat:prod.cat,qty:1});
  localStorage.setItem('ghz_cart',JSON.stringify(cart));
  updateCartBadge();
  toast(`✅ تمت الإضافة: ${prod.name}`);
}

function updateCartBadge() {
  const total = cart.reduce((s,i)=>s+i.qty,0);
  const b = document.getElementById('cartBadge');
  if(b) { b.textContent=total; b.style.display=total>0?'flex':'none'; }
}

function renderCart() {
  const el = document.getElementById('pCart');
  if(!cart.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🛒</div><h3>السلة فارغة</h3></div>'; return; }
  let total=0;
  const items = cart.map((item,i)=>{
    const priceLira = Math.round(item.price*exchangeRate);
    const itemTotal = priceLira*item.qty;
    total += itemTotal;
    return `<div class="cart-item">
      <div style="flex:1"><div style="font-weight:800;font-size:13px">${item.name}</div><div style="font-size:10px;color:var(--text2)">${Object.values(branchesConfig).find(b=>b)?branchesConfig[item.branchId]?.name||item.branchId:item.branchId}</div></div>
      <input class="cart-qty" type="number" min="1" value="${item.qty}" onchange="updateQty(${i},this.value)">
      <div style="font-weight:800;font-size:12px;color:var(--accent)">${itemTotal.toLocaleString('ar-SY')}</div>
      <button class="btn btn-red btn-sm" onclick="removeCartItem(${i})">✕</button>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="sec-hdr"><div class="sec-title">🛒 السلة</div></div>
    ${items}
    <div style="background:var(--accent);border-radius:12px;padding:12px;text-align:center;margin:12px 0;font-weight:900;font-size:14px">
      الإجمالي: ${total.toLocaleString('ar-SY')} ل.س
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" style="flex:1;justify-content:center;padding:12px" onclick="checkout('cash')">💵 كاش</button>
      <button class="btn btn-ghost" style="flex:1;justify-content:center;padding:12px" onclick="checkout('credit')">📝 دين</button>
    </div>
  `;
}

function updateQty(i,v) {
  v=parseInt(v);
  if(v<1){removeCartItem(i);return;}
  const item=cart[i];
  const prod=products.find(p=>p.id==item.prodId);
  if(prod&&prod.stock[item.branchId]>=v){cart[i].qty=v;localStorage.setItem('ghz_cart',JSON.stringify(cart));renderCart();}
  else toast('❌ كمية غير كافية','err');
}

function removeCartItem(i) {
  cart.splice(i,1);
  localStorage.setItem('ghz_cart',JSON.stringify(cart));
  updateCartBadge();
  renderCart();
}

function checkout(method) {
  if(!cart.length){toast('السلة فارغة','err');return;}
  for(const item of cart){
    const prod=products.find(p=>p.id==item.prodId);
    if(!prod||prod.stock[item.branchId]<item.qty){toast(`❌ ${item.name} غير متوفر بالكمية المطلوبة`,'err');return;}
  }
  if(method==='credit') {
    // Open debt modal with cart total pre-filled
    const total=cart.reduce((s,i)=>s+Math.round(i.price*exchangeRate)*i.qty,0);
    const details=cart.map(i=>i.name).join('، ');
    const branchId=cart[0]?.branchId||me.branchId||'oldtown';
    openDebtModalFromCart(total,details,branchId);
    return;
  }
  processCheckout(method,'');
}

function processCheckout(method,debtorName) {
  for(const item of cart){
    const prod=products.find(p=>p.id==item.prodId);
    prod.stock[item.branchId]-=item.qty;
    const totalLira=Math.round(item.price*exchangeRate)*item.qty;
    sales.unshift({id:Date.now(),branchId:item.branchId,branchName:branchesConfig[item.branchId]?.name||item.branchId,prodId:item.prodId,prodName:item.name,cat:item.cat,qty:item.qty,priceDollar:item.price,priceLira:Math.round(item.price*exchangeRate),totalLira,date:new Date().toLocaleString(),dateOnly:new Date().toISOString().slice(0,10),seller:me.username,method,debtorName});
    if(prod.stock[item.branchId]<5) messages.push({from:me.username,to:'admin',text:`🔔 تنبيه: ${prod.name} في ${branchesConfig[item.branchId]?.name} أصبح ${prod.stock[item.branchId]} قطعة فقط`,time:new Date().toLocaleString(),read:false});
  }
  save();
  cart=[];
  localStorage.setItem('ghz_cart',JSON.stringify(cart));
  updateCartBadge();
  toast(`✅ تم البيع (${method==='cash'?'كاش':'دين'})${debtorName?' - '+debtorName:''}`);
  renderCart();
}

          <div class="inv-bar"><div class="inv-fill" style="width:${Math.min(100,fill)}%;background:${low?'var(--red)':'var(--green)'}"></div></div>

function openProdModal(id) {

    document.getElementById('pStSouk').value=p.stock.souk||0;

function previewProdImg(input) {
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('pImgData').value=e.target.result;
    document.getElementById('pImgPreview').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  reader.readAsDataURL(input.files[0]);
}

  document.getElementById('pImgData').value='';
  document.getElementById('pImgPreview').innerHTML='📷';
  document.getElementById('pImgFile').value='';
}

function saveProd() {
  const name=document.getElementById('pName').value.trim();
  const cat=document.getElementById('pCat').value;
  const price=parseFloat(document.getElementById('pPrice').value);
  const desc=document.getElementById('pDesc').value;
  const old=parseInt(document.getElementById('pStOld').value)||0;
  const castle=parseInt(document.getElementById('pStCastle').value)||0;
  const souk=parseInt(document.getElementById('pStSouk').value)||0;
  const img=document.getElementById('pImgData').value;
  if(!name||isNaN(price)){toast('⚠️ اسم المنتج والسعر مطلوبان','err');return;}
  if(editProdId){
    const p=products.find(x=>x.id==editProdId);
    p.name=name;p.cat=cat;p.price=price;p.desc=desc;p.stock={oldtown:old,castle,souk};if(img)p.img=img;
    toast('✅ تم التعديل');
  } else {
    products.push({id:nextProdId++,name,cat,price,desc,stock:{oldtown:old,castle,souk},img});
    toast('✅ تمت الإضافة');
  }
  save();closeOverlay('mProd');renderInventory();
}

function uploadLogoBtn() {
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{companyLogo=ev.target.result;localStorage.setItem('ghz_logo',companyLogo);updateLogos();toast('✅ تم تغيير الشعار');if(document.getElementById('pSettings').classList.contains('active'))renderSettings();};
    reader.readAsDataURL(file);
  };
  inp.click();
}

function updateLogos() {
  const loginLogo=document.getElementById('loginLogo');
  const tbLogo=document.getElementById('tbLogo');
  if(companyLogo){
    if(loginLogo)loginLogo.innerHTML=`<img src="${companyLogo}" style="width:100%;height:100%;object-fit:cover;border-radius:18px">`;
    if(tbLogo)tbLogo.innerHTML=`<img src="${companyLogo}">`;
    // Update favicon
    let link=document.querySelector("link[rel~='icon']");
    if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link);}
    link.href=companyLogo;
  }
}

function editRate() {
  if(me.role!=='مدير عام'){toast('❌ غير مصرح','err');return;}
  const newBuy=parseFloat(prompt(`سعر الشراء الحالي: ${buyRate} ل.س\nأدخل سعر الشراء الجديد:`,buyRate));
  if(isNaN(newBuy)||newBuy<=0){toast('❌ قيمة غير صالحة','err');return;}
  const newSell=parseFloat(prompt(`سعر المبيع الحالي: ${sellRate} ل.س\nأدخل سعر المبيع الجديد:`,sellRate));
  if(isNaN(newSell)||newSell<=0){toast('❌ قيمة غير صالحة','err');return;}
  buyRate=newBuy; sellRate=newSell; exchangeRate=Math.round((newBuy+newSell)/2);
  save();
  toast('✅ تم تحديث أسعار الصرف');
  if(document.getElementById('pStore').classList.contains('active')) renderStore();
  if(document.getElementById('pSettings').classList.contains('active')) renderSettings();
}

function renderChat() {
  const list=document.getElementById('chatList');
  const myMsgs=messages.filter(m=>m.from===me.username||m.to===me.username);
  if(!myMsgs.length){list.innerHTML='<div class="empty"><h3>لا توجد رسائل</h3></div>';return;}
  list.innerHTML=myMsgs.map(m=>{
    const sender=m.from===me.username?'أنت':users.find(u=>u.username===m.from)?.name||m.from;
    return `<div style="background:var(--bg3);border-radius:10px;padding:8px;margin-bottom:6px"><div style="font-size:11px;font-weight:800;color:var(--accent)">${sender}</div><div style="font-size:12px;margin:3px 0">${m.text}</div><div style="font-size:9px;color:var(--text2)">${m.time}</div></div>`;
  }).join('');
  list.scrollTop=list.scrollHeight;
}

function sendMsg() {
  const to=document.getElementById('msgTo').value;
  const text=document.getElementById('msgText').value.trim();
  if(!text){toast('⚠️ اكتب رسالة','err');return;}
  messages.push({from:me.username,to,text,time:new Date().toLocaleString(),read:false});
  save();document.getElementById('msgText').value='';renderChat();updateMsgBadge();toast('✅ تم الإرسال');
}

function updateMsgBadge() {
  const unread=messages.filter(m=>m.to===me?.username&&!m.read).length;
  const b=document.getElementById('msgBadge');
  if(b){b.textContent=unread;b.style.display=unread>0?'flex':'none';}
}

// ═══════════════ DEBT SYSTEM ═══════════════
function openDebtModalFromCart(amount,details,branchId) {
  const branchSel=document.getElementById('dBranch');
  branchSel.innerHTML=Object.entries(branchesConfig).map(([id,v])=>`<option value="${id}" ${id===branchId?'selected':''}>${v.name}</option>`).join('');
  document.getElementById('dName').value='';
  document.getElementById('dPhone').value='';
  document.getElementById('dAmount').value=amount;
  document.getElementById('dDetails').value=details;
  document.getElementById('mDebt').classList.add('active');
}

function openDebtModal() {
  const branchSel=document.getElementById('dBranch');
  branchSel.innerHTML=Object.entries(branchesConfig).map(([id,v])=>`<option value="${id}">${v.name}</option>`).join('');
  ['dName','dPhone','dDetails'].forEach(f=>document.getElementById(f).value='');
  document.getElementById('dAmount').value='';
  document.getElementById('mDebt').classList.add('active');
}

function saveDebt() {
  const name=document.getElementById('dName').value.trim();
  const phone=document.getElementById('dPhone').value.trim();
  const amount=parseFloat(document.getElementById('dAmount').value);
  const details=document.getElementById('dDetails').value.trim();
  const branchId=document.getElementById('dBranch').value;
  if(!name||!amount){toast('⚠️ الاسم والمبلغ مطلوبان','err');return;}
  const debt={id:Date.now(),name,phone,amount,details,branchId,branchName:branchesConfig[branchId]?.name||branchId,date:new Date().toLocaleString(),dateOnly:new Date().toISOString().slice(0,10),paid:false,seller:me.username};
  debts.unshift(debt);
  // If came from cart checkout
  if(cart.length>0) processCheckout('credit',name);
  else { save(); toast('✅ تم حفظ الدين'); }
  closeOverlay('mDebt');
  if(document.getElementById('pDebt').classList.contains('active')) renderDebt();
}

function renderDebt() {
  const el=document.getElementById('pDebt');
  const canAdd=me.role!=='زبون';
  el.innerHTML=`
    <div class="sec-hdr">
      <div class="sec-title">📒 دفتر الديون</div>
      ${canAdd?'<button class="btn btn-acc btn-sm" onclick="openDebtModal()">➕ دين جديد</button>':''}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <input id="debtSearch" placeholder="🔍 بحث باسم أو مبلغ..." oninput="filterDebts()" style="flex:1;padding:9px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:12px;outline:none">
      <select id="debtFilter" onchange="filterDebts()" style="padding:9px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:12px;outline:none">
        <option value="all">الكل</option>
        <option value="unpaid">غير مسدد</option>
        <option value="paid">مسدد</option>
      </select>
    </div>
    <div id="debtStats" style="margin-bottom:10px"></div>
    <div id="debtList"></div>
  `;
  filterDebts();
}

function filterDebts() {
  const q=(document.getElementById('debtSearch')?.value||'').toLowerCase();
  const filter=document.getElementById('debtFilter')?.value||'all';
  let items=[...debts];
  if(me.branchId) items=items.filter(d=>d.branchId===me.branchId);
  if(filter==='unpaid') items=items.filter(d=>!d.paid);
  if(filter==='paid') items=items.filter(d=>d.paid);
  if(q) items=items.filter(d=>d.name.toLowerCase().includes(q)||d.amount.toString().includes(q)||(d.details||'').toLowerCase().includes(q)||(d.phone||'').includes(q));

  const totalDebt=items.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);
  const totalPaid=items.filter(d=>d.paid).reduce((s,d)=>s+d.amount,0);
  document.getElementById('debtStats').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--red);font-weight:700">💸 إجمالي الديون</div>
        <div style="font-size:16px;font-weight:900;color:var(--red)">${totalDebt.toLocaleString('ar-SY')}</div>
        <div style="font-size:9px;color:var(--text2)">ل.س</div>
      </div>
      <div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:10px;color:var(--green);font-weight:700">✅ إجمالي المسدد</div>
        <div style="font-size:16px;font-weight:900;color:var(--green)">${totalPaid.toLocaleString('ar-SY')}</div>
        <div style="font-size:9px;color:var(--text2)">ل.س</div>
      </div>
    </div>
  `;

  const list=document.getElementById('debtList');
  if(!items.length){list.innerHTML='<div class="empty"><div class="empty-icon">📒</div><h3>لا توجد ديون</h3></div>';return;}
  list.innerHTML=items.map(d=>`
    <div class="card" style="border-right:4px solid ${d.paid?'var(--green)':'var(--red)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:14px;font-weight:900">${d.name}</div>
          ${d.phone?`<a href="tel:${d.phone}" style="font-size:11px;color:var(--blue);text-decoration:none">📞 ${d.phone}</a>`:''}
        </div>
        <div style="text-align:left">
          <div style="font-size:16px;font-weight:900;color:${d.paid?'var(--green)':'var(--red)'}">${d.amount.toLocaleString('ar-SY')}</div>
          <div style="font-size:9px;color:var(--text2)">ل.س</div>
        </div>
      </div>
      ${d.details?`<div style="font-size:11px;color:var(--text2);margin-bottom:6px">📦 ${d.details}</div>`:''}
      <div style="font-size:10px;color:var(--text2);margin-bottom:8px">🏢 ${d.branchName} | 📅 ${d.date}</div>
      <div style="display:flex;gap:6px">
        ${!d.paid?`<button class="btn btn-green btn-sm" onclick="markPaid(${d.id})">✅ سدّد</button>`:'<span class="bdg bdg-green">✅ مسدد</span>'}
        ${d.phone?`<button class="btn btn-sm" style="background:#25d366;color:#fff" onclick="whatsappDebt('${d.phone}','${d.name}',${d.amount})">💬</button>`:''}
        <button class="btn btn-red btn-sm" onclick="deleteDebt(${d.id})">🗑️</button>
      </div>
    </div>
  `).join('');
}

function markPaid(id){
  const d=debts.find(x=>x.id===id);
  if(d){d.paid=true;save();filterDebts();toast('✅ تم تسديد الدين');}
}
function deleteDebt(id){
  if(confirm('حذف هذا الدين؟')){debts=debts.filter(d=>d.id!==id);save();filterDebts();toast('🗑️ تم الحذف');}
}
function whatsappDebt(phone,name,amount){
  const msg=encodeURIComponent(`السلام عليكم ${name}، يرجى تسديد مبلغ ${amount.toLocaleString('ar-SY')} ل.س. شكراً - مجموعة غرزالدين`);
  window.open(`https://wa.me/+${phone.replace(/\D/g,'')}?text=${msg}`,'_blank');
}

// ═══════════════ FACEBOOK ═══════════════
function openFBMenu() {
  const isAdmin=me.role==='مدير عام';
  const list=document.getElementById('fbPagesList');
  list.innerHTML=fbPages.map(p=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:12px;margin-bottom:8px">
      <div style="width:36px;height:36px;background:#1877f2;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </div>
      <div style="flex:1;cursor:pointer" onclick="window.open('${p.url}','_blank')">
        <div style="font-size:13px;font-weight:800">${p.name}</div>
        <div style="font-size:10px;color:#1877f2">اضغط للفتح ↗</div>
      </div>
      ${isAdmin?`<button class="btn btn-red btn-sm" onclick="deleteFBPage(${p.id})">🗑️</button>`:''}
    </div>
  `).join('') || '<div class="empty"><h3>لا توجد صفحات</h3></div>';

  const adminAdd=document.getElementById('fbAdminAdd');
  if(isAdmin) {
    adminAdd.innerHTML=`
      <div style="background:var(--bg3);border-radius:12px;padding:12px">
        <div style="font-size:12px;font-weight:800;margin-bottom:8px">➕ إضافة صفحة</div>
        <input id="fbName" placeholder="اسم الصفحة" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;margin-bottom:6px">
        <input id="fbUrl" placeholder="رابط الصفحة https://..." style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Tajawal',sans-serif;margin-bottom:8px;direction:ltr">
        <button class="btn btn-acc" style="width:100%;justify-content:center" onclick="addFBPage()">إضافة</button>
      </div>
    `;
  } else adminAdd.innerHTML='';
  document.getElementById('mFB').classList.add('active');
}

function addFBPage(){
  const name=document.getElementById('fbName')?.value.trim();
  const url=document.getElementById('fbUrl')?.value.trim();
  if(!name||!url){toast('⚠️ الاسم والرابط مطلوبان','err');return;}
  fbPages.push({id:Date.now(),name,url});
  save();openFBMenu();toast('✅ تمت الإضافة');
}

function deleteFBPage(id){
  fbPages=fbPages.filter(p=>p.id!==id);
  save();openFBMenu();toast('🗑️ تم الحذف');
}

// ═══════════════ UTILS ═══════════════
function openWA(){window.open(`https://wa.me/${PHONE_WA}?text=${encodeURIComponent('مرحباً 👋، أريد الاستفسار عن منتجاتكم')}`,'_blank')}
function openGPS(){window.open(`https://www.google.com/maps?q=${GPS_LAT},${GPS_LNG}`,'_blank')}
function closeOverlay(id){document.getElementById(id).classList.remove('active')}

function toast(msg,type='ok') {
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='err'?'var(--red)':type==='ok'?'var(--green)':'var(--card2)';
  t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// Close overlay on backdrop click
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('active')}));

updateCartBadge();
</script>
