<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>مجموعة غرزالدين التجارية</title>
<link rel="icon" id="dynamicFavicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛍️%3C/text%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a; --card:#1e2330; --card2:#242838;
    --accent:#ff6b35; --gold:#f5c518; --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
    --text:#f0f2ff; --text2:#8b92a8; --border:#2a2f3e;
  }
  body{font-family:'Segoe UI', system-ui, 'Tahoma', sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .screen{display:none;min-height:100vh}
  .screen.active{display:block}
  #loginScreen.active{display:flex;align-items:center;justify-content:center;background:var(--bg)}
  #appScreen.active{display:flex;flex-direction:column}
  .login-wrap{width:100%;max-width:400px;padding:20px}
  .login-card{background:var(--card);border-radius:28px;padding:30px 24px}
  .logo-wrap{text-align:center;margin-bottom:20px}
  .logo-icon{width:80px;height:80px;margin:0 auto 10px;border-radius:20px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
  .logo-icon img{width:100%;height:100%;object-fit:cover}
  .logo-name{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
  .tab-btn{flex:1;padding:8px;border:none;background:var(--bg3);color:var(--text2);border-radius:12px;cursor:pointer;font-weight:700}
  .tab-btn.active{background:var(--accent);color:#fff}
  .inp-wrap input{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);margin-bottom:12px}
  .btn-enter{width:100%;padding:14px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-weight:800;cursor:pointer}
  .err{color:var(--red);display:none;margin-top:8px;text-align:center}
  .hint{font-size:12px;color:var(--text2);margin-top:16px}
  .topbar{background:var(--card);padding:0 12px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
  .tb-brand{display:flex;align-items:center;gap:8px;font-weight:900;font-size:18px}
  .tb-brand img{height:36px;width:36px;border-radius:8px}
  .tb-actions{display:flex;align-items:center;gap:8px}
  .exchange-rate-display{background:var(--bg3);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold;color:var(--gold);white-space:nowrap}
  .tb-icon-btn{background:var(--bg3);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
  .tb-icon-btn.wa{background:#25d366;border-color:#25d366}
  .tb-icon-btn svg{width:18px;height:18px}
  .badge-count{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center}
  .bottom-nav-wrapper{overflow-x:auto;white-space:nowrap;background:var(--card);border-top:1px solid var(--border);position:sticky;bottom:0}
  .bottom-nav{display:inline-flex;padding:0 4px}
  .bn-item{display:inline-flex;flex-direction:column;align-items:center;padding:8px 14px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:800}
  .bn-item.active{color:var(--accent)}
  .content{flex:1;overflow-y:auto;padding:16px}
  .panel{display:none}
  .panel.active{display:block}
  .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .sec-title{font-size:20px;font-weight:800}
  .branch-buttons,.dept-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .branch-btn,.dept-btn{padding:8px 16px;border-radius:30px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-weight:700}
  .branch-btn.active,.dept-btn.active{background:var(--accent);color:#fff}
  .branch-address{background:var(--bg3);border-radius:12px;padding:8px;margin-bottom:12px;font-size:12px;color:var(--gold)}
  .search-box input{width:100%;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);margin-bottom:16px}
  .pg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:600px){.pg{grid-template-columns:repeat(3,1fr)}}
  .pc{background:var(--card);border-radius:18px;overflow:hidden}
  .pc-img{height:150px;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
  .pc-img img{width:100%;height:100%;object-fit:cover}
  .pc-img span{font-size:48px}
  .pc-body{padding:12px}
  .pc-name{font-weight:800;font-size:15px}
  .pc-price{color:var(--accent);font-weight:900;margin:6px 0;font-size:16px}
  .pc-details{font-size:10px;color:var(--text2);margin:4px 0}
  .btn-add-to-cart{width:100%;padding:8px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-weight:800;cursor:pointer;margin-top:6px}
  .inv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .inv-card{background:var(--card);border-radius:16px;padding:12px;margin-bottom:8px}
  .inv-bar{background:var(--bg3);border-radius:6px;height:6px;margin:8px 0}
  .inv-fill{height:100%;border-radius:6px}
  .cart-item{display:flex;gap:8px;align-items:center;background:var(--bg3);margin-bottom:8px;padding:8px;border-radius:12px;flex-wrap:wrap}
  .cart-item input{width:60px;background:var(--bg);color:#fff;border-radius:8px;padding:4px}
  .cart-item .remove{background:var(--red);border:none;border-radius:8px;color:#fff;padding:4px 10px;cursor:pointer}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:var(--card);border-radius:16px;padding:12px;text-align:center}
  .stat-val{font-size:24px;font-weight:800}
  .wallet-table,.report-table{width:100%;border-collapse:collapse;display:block;overflow-x:auto}
  .wallet-table th,.wallet-table td,.report-table th,.report-table td{padding:8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  .btn{padding:6px 12px;border-radius:10px;border:none;font-weight:800;cursor:pointer}
  .btn-acc{background:var(--accent);color:#fff}
  .btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text)}
  .btn-sm{padding:4px 10px;font-size:12px}
  .btn-red{background:var(--red);color:#fff}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card2);padding:10px 20px;border-radius:12px;z-index:999;display:none}
  .toast.show{display:block}
  .empty{text-align:center;padding:40px;color:var(--text2)}
  .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden;opacity:0;transition:0.3s}
  .modal.active{visibility:visible;opacity:1}
  .modal-content{background:var(--card2);border-radius:24px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
  .fg{margin-bottom:12px}
  .fg label{display:block;font-size:13px;margin-bottom:4px}
  .fg input,.fg select{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text)}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .emp-card{background:var(--card);border-radius:16px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;flex-wrap:wrap}
  .chat-msg{background:var(--bg3);border-radius:12px;padding:8px;margin-bottom:8px}
  .chat-sender{font-weight:800;color:var(--accent)}
  .alert-item{background:var(--bg3);border-radius:12px;padding:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="screen active">
<div class="login-wrap">
<div class="login-card">
  <div class="logo-wrap">
    <div class="logo-icon" id="loginLogoIcon"><span>🏢</span></div>
    <div class="logo-name">مجموعة غرزالدين</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('admin')">مدير عام</button>
    <button class="tab-btn" onclick="setTab('branchMgr')">رئيس فرع</button>
    <button class="tab-btn" onclick="setTab('deptMgr')">رئيس قسم</button>
    <button class="tab-btn" onclick="setTab('emp')">موظف</button>
    <button class="tab-btn" onclick="setTab('guest')">زبون</button>
  </div>
  <div class="inp-wrap"><input id="lUser" placeholder="اسم المستخدم"></div>
  <div class="inp-wrap" id="lPassWrap"><input id="lPass" type="password" placeholder="كلمة المرور"></div>
  <div><input type="checkbox" id="rememberMe"> <label>تذكّرني</label></div>
  <button class="btn-enter" onclick="login()">دخول</button>
  <div class="err" id="lErr">بيانات خاطئة</div>
  <div class="hint">
    مدير عام: admin / admin123<br>
    رئيس فرع أول البلد: oldtown / 123<br>
    رئيس فرع حارة القلعة: castle / 123<br>
    رئيس فرع السوق: souk / 123<br>
    رئيس قسم ملابس: clothes / 123<br>
    موظف: emp1 / emp123
  </div>
</div>
</div>
</div>

<!-- شاشة التطبيق -->
<div id="appScreen" class="screen">
  <div class="topbar">
    <div class="tb-brand" id="appLogoArea"><span>🏢</span><span>غرزالدين</span></div>
    <div class="tb-actions">
      <div class="exchange-rate-display" id="exchangeRateDisplay">💵 1$ = <span id="rateValue">...</span> ل.س</div>
      <button class="tb-icon-btn wa" onclick="openWA()">
        <svg viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.533 5.845L.057 23.492c-.083.334.239.632.568.527l5.845-1.867A11.948 11.948 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
      </button>
      <button class="tb-icon-btn" onclick="openGPS()">🌐</button>
      <button id="msgBtn" class="tb-icon-btn" onclick="openMessages()">💬<span id="msgBadge" class="badge-count" style="display:none">0</span></button>
      <button id="alertBtn" class="tb-icon-btn" onclick="openAlertModal()">🔔</button>
      <button id="dollarBtn" class="tb-icon-btn" onclick="handleDollarClick()">💵</button>
      <button class="tb-icon-btn exit" onclick="logout()">🚪</button>
    </div>
  </div>
  <div class="content">
    <div class="panel active" id="pStore"></div>
    <div class="panel" id="pCart"></div>
    <div class="panel" id="pProducts"></div>
    <div class="panel" id="pInventory"></div>
    <div class="panel" id="pReports"></div>
    <div class="panel" id="pWallet"></div>
    <div class="panel" id="pEmployees"></div>
    <div class="panel" id="pSettings"></div>
  </div>
  <div class="bottom-nav-wrapper">
    <div class="bottom-nav">
      <button class="bn-item" data-panel="pStore">🏠 الرئيسية</button>
      <button class="bn-item" data-panel="pCart">🛒 السلة</button>
      <button class="bn-item" data-panel="pProducts">📋 المنتجات</button>
      <button class="bn-item" data-panel="pInventory">📦 المخزون</button>
      <button class="bn-item" data-panel="pReports">📊 التقارير</button>
      <button class="bn-item" data-panel="pWallet">💰 المحفظة</button>
      <button class="bn-item" data-panel="pEmployees">👥 الموظفون</button>
      <button class="bn-item" data-panel="pSettings">⚙️ الإعدادات</button>
    </div>
  </div>
</div>

<script>
// ------------------- بيانات أساسية -------------------
const branchesData = {
  oldtown: { name: 'أول البلد', address: 'مفرق نص البلد - بيت السيد رجا غرزالدين', categories: ['مواد غذائية','بهارات','مكسرات','ألعاب','ألبان'] },
  castle: { name: 'حارة القلعة', address: 'بيت السيد رافع هلال - غرزالدين', categories: ['مواد غذائية','بهارات','مكسرات','ألعاب','ألبان'] },
  souk: { name: 'السوق', address: 'دخلة الفرن الخاص - الطابق الأرضي', categories: ['مواد غذائية','ملابس','أحذية','ميك أب','عطور','ألعاب','أدوات منزلية','بهارات','مكسرات','ألبان','هدايا'] }
};
let branches = Object.keys(branchesData).map(id => ({ id, name: branchesData[id].name, address: branchesData[id].address }));
let allCategories = [...new Set(Object.values(branchesData).flatMap(b=>b.categories))];

// منتجات أولية
let products = JSON.parse(localStorage.getItem('products')) || (()=>{
  let list = []; let id=1;
  let sample = {
    'مواد غذائية': ['أرز بسمتي','زيت زيتون','سكر','دقيق'],
    'بهارات': ['فلفل أسود','كمون','كركم'],
    'مكسرات': ['كاجو','لوز','جوز'],
    'ألعاب': ['سيارة تحكم','دمية','ليغو'],
    'ألبان': ['حليب','زبادي','جبنة'],
    'ملابس': ['قميص','بنطال','جاكيت'],
    'أحذية': ['حذاء رياضي','صندل'],
    'ميك أب': ['أحمر شفاه','كحل'],
    'عطور': ['عطر فرنسي','عود'],
    'أدوات منزلية': ['طنجرة','مكنسة'],
    'هدايا': ['صندوق هدايا','باقة ورد']
  };
  for(let cat of allCategories){
    let items = sample[cat] || ['منتج '+cat];
    for(let item of items){
      let price = Math.floor(Math.random()*70)+20;
      let stock = { oldtown: Math.floor(Math.random()*15)+5, castle: Math.floor(Math.random()*15)+5, souk: Math.floor(Math.random()*25)+10 };
      list.push({ id: id++, name: item, category: cat, price: price, stock: stock, image: '', description: `منتج ${cat}` });
    }
  }
  return list;
})();

// المستخدمون (أسماء بالعربية)
let users = JSON.parse(localStorage.getItem('users')) || [
  { id:1, name:'مدير عام', username:'admin', password:'admin123', role:'مدير عام', branchId:null, dept:null, manager:null },
  { id:2, name:'رئيس فرع أول البلد', username:'oldtown', password:'123', role:'رئيس فرع', branchId:'oldtown', dept:null, manager:null },
  { id:3, name:'رئيس فرع حارة القلعة', username:'castle', password:'123', role:'رئيس فرع', branchId:'castle', dept:null, manager:null },
  { id:4, name:'رئيس فرع السوق', username:'souk', password:'123', role:'رئيس فرع', branchId:'souk', dept:null, manager:null },
  { id:5, name:'رئيس قسم ملابس', username:'clothes', password:'123', role:'رئيس قسم', branchId:null, dept:'ملابس', manager:null },
  { id:6, name:'موظف أول البلد', username:'emp1', password:'emp123', role:'موظف', branchId:'oldtown', dept:null, manager:'oldtown' }
];
let sales = JSON.parse(localStorage.getItem('sales')) || [];
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let messages = JSON.parse(localStorage.getItem('messages')) || [];
let exchangeRate = parseFloat(localStorage.getItem('exchangeRate')) || 15000; // سعر صرف الدولار بالليرة
let currentUser = null;
let currentTab = 'admin';
let logoBase64 = localStorage.getItem('companyLogo') || '';
let faviconBase64 = localStorage.getItem('companyFavicon') || '';

// دوال مساعدة
function saveAll(){ localStorage.setItem('products',JSON.stringify(products)); localStorage.setItem('users',JSON.stringify(users)); localStorage.setItem('sales',JSON.stringify(sales)); localStorage.setItem('messages',JSON.stringify(messages)); localStorage.setItem('exchangeRate',exchangeRate); }
function showNotification(msg){ let t=document.createElement('div'); t.className='toast show'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function updateAllLogos(){
  let loginIcon=document.getElementById('loginLogoIcon'), appLogo=document.getElementById('appLogoArea');
  if(logoBase64){ loginIcon.innerHTML=`<img src="${logoBase64}">`; appLogo.innerHTML=`<img src="${logoBase64}"><span>غرزالدين</span>`; }
  else { loginIcon.innerHTML='<span>🏢</span>'; appLogo.innerHTML='<span>🏢</span><span>غرزالدين</span>'; }
}
function updateFavicon(){ let link=document.getElementById('dynamicFavicon'); link.href=faviconBase64 || "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛍️%3C/text%3E%3C/svg%3E"; }
function uploadCompanyLogo(){ uploadImage('logo'); }
function uploadFavicon(){ uploadImage('favicon'); }
function uploadImage(type){
  let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{ let file=e.target.files[0]; if(!file) return; let reader=new FileReader(); reader.onload=ev=>{ if(type==='logo'){ logoBase64=ev.target.result; localStorage.setItem('companyLogo',logoBase64); updateAllLogos(); } else { faviconBase64=ev.target.result; localStorage.setItem('companyFavicon',faviconBase64); updateFavicon(); } showNotification('تم التغيير'); }; reader.readAsDataURL(file); };
  inp.click();
}
function updateExchangeRateDisplay(){
  let rateSpan = document.getElementById('rateValue');
  if(rateSpan) rateSpan.innerText = exchangeRate;
}
function handleDollarClick(){
  if(currentUser.role === 'مدير عام'){
    let newRate = parseFloat(prompt(`سعر الصرف الحالي: 1$ = ${exchangeRate} ل.س\nأدخل السعر الجديد (ل.س):`, exchangeRate));
    if(!isNaN(newRate) && newRate>0){
      exchangeRate = newRate;
      localStorage.setItem('exchangeRate', exchangeRate);
      updateExchangeRateDisplay();
      showNotification('تم تحديث سعر صرف الدولار');
      renderAll();
    } else { showNotification('قيمة غير صالحة'); }
  } else {
    showNotification('غير مصرح لك بتغيير سعر الصرف. فقط المدير العام يمكنه التعديل.');
  }
}
function getProductPriceInLira(priceInDollar){ return Math.round(priceInDollar * exchangeRate); }
function renderAll(){ renderStore(); renderProductsList(); renderInventory(); renderReports(); renderWallet(); updateMsgBadge(); updateExchangeRateDisplay(); }

// الصلاحيات
function canSell(){ return currentUser && currentUser.role !== 'زبون'; }
function getUserBranch(){ return currentUser?.branchId || null; }
function getUserDept(){ return currentUser?.dept || null; }
function filterProducts(list){
  if(!currentUser) return [];
  if(currentUser.role === 'مدير عام') return list;
  if(currentUser.branchId) { let cats=branchesData[currentUser.branchId]?.categories||[]; return list.filter(p=>cats.includes(p.category)); }
  if(currentUser.dept) return list.filter(p=>p.category===currentUser.dept);
  return [];
}

// السلة (نفس الكود السابق مع تعديل الأسعار)
function addToCart(prodId,branchId,qty=1){
  if(!canSell()){ showNotification('غير مسموح بالبيع'); return; }
  let prod=products.find(p=>p.id==prodId);
  if(!prod) return;
  if(currentUser.branchId) branchId=currentUser.branchId;
  if(!branchesData[branchId]?.categories.includes(prod.category)){ showNotification('هذا القسم غير متوفر في هذا الفرع'); return; }
  let stock=prod.stock[branchId];
  if(stock<qty){ showNotification(`الكمية المتاحة: ${stock}`); return; }
  let existing=cart.find(i=>i.productId==prodId && i.branchId==branchId);
  if(existing){ if(existing.quantity+qty>stock){ showNotification(`لا يمكن إضافة أكثر من ${stock}`); return; } existing.quantity+=qty; }
  else { cart.push({ productId:prodId, branchId, productName:prod.name, priceDollar:prod.price, quantity:qty, category:prod.category }); }
  localStorage.setItem('cart',JSON.stringify(cart));
  showNotification(`تم إضافة ${prod.name}`);
  renderCart();
}
function removeFromCart(idx){ cart.splice(idx,1); localStorage.setItem('cart',JSON.stringify(cart)); renderCart(); }
function updateCartQty(idx,newQty){
  if(newQty<1){ removeFromCart(idx); return; }
  let item=cart[idx];
  let prod=products.find(p=>p.id==item.productId);
  if(prod && prod.stock[item.branchId]>=newQty){ item.quantity=newQty; localStorage.setItem('cart',JSON.stringify(cart)); renderCart(); }
  else showNotification('كمية غير متوفرة');
}
function checkoutCart(paymentMethod){
  if(cart.length===0){ showNotification('السلة فارغة'); return; }
  for(let item of cart){
    let prod=products.find(p=>p.id==item.productId);
    if(!prod || prod.stock[item.branchId]<item.quantity){ showNotification(`المنتج ${item.productName} غير متوفر`); return; }
  }
  for(let item of cart){
    let prod=products.find(p=>p.id==item.productId);
    prod.stock[item.branchId]-=item.quantity;
    let totalLira = getProductPriceInLira(item.priceDollar) * item.quantity;
    let sale={ id:Date.now(), branchId:item.branchId, branchName:branches.find(b=>b.id==item.branchId).name, productId:item.productId, productName:item.productName, category:item.category, quantity:item.quantity, priceDollar:item.priceDollar, priceLira:getProductPriceInLira(item.priceDollar), totalLira, date:new Date().toLocaleString(), dateOnly:new Date().toISOString().slice(0,10), seller:currentUser.username, paymentMethod };
    sales.unshift(sale);
    if(prod.stock[item.branchId] < 5){
      let alertMsg = `🔔 المنتج ${prod.name} في فرع ${branches.find(b=>b.id==item.branchId).name} أصبح متبقياً ${prod.stock[item.branchId]} قطعة فقط.`;
      messages.push({ from: currentUser.username, to: 'admin', text: alertMsg, time: new Date().toLocaleString(), read: false });
    }
  }
  saveAll();
  cart=[]; localStorage.setItem('cart',JSON.stringify(cart));
  showNotification(`تم البيع (${paymentMethod==='cash'?'كاش':'دين'})`);
  renderAll();
  renderCart();
}
function renderCart(){
  let cont=document.getElementById('pCart');
  if(!cont) return;
  if(cart.length===0){ cont.innerHTML='<div class="empty">السلة فارغة</div>'; return; }
  let totalLira=0, html='';
  cart.forEach((item,idx)=>{
    let priceLira = getProductPriceInLira(item.priceDollar);
    let itemTotal = priceLira * item.quantity;
    totalLira += itemTotal;
    html+=`<div class="cart-item"><div style="flex:2"><b>${item.productName}</b><br><small>${branches.find(b=>b.id===item.branchId)?.name}</small></div><input type="number" min="1" value="${item.quantity}" onchange="updateCartQty(${idx},this.value)"><div>${priceLira} ل.س</div><div>${itemTotal} ل.س</div><button class="remove" onclick="removeFromCart(${idx})">✖</button></div>`;
  });
  cont.innerHTML=`<div class="sec-hdr"><div class="sec-title">🛒 السلة</div></div>${html}<div style="margin:16px 0;background:var(--accent);padding:12px;border-radius:12px;text-align:center"><b>الإجمالي: ${totalLira} ل.س</b></div><div style="display:flex;gap:8px"><button class="btn btn-acc" onclick="checkoutCart('cash')">💰 كاش</button><button class="btn btn-ghost" onclick="checkoutCart('credit')">📝 دين</button></div>`;
}

// عرض المنتجات والتقارير والمحفظة (مختصرة ولكن كاملة)
function renderProductCard(p,branchId){
  let stock=p.stock[branchId]||0;
  let priceLira = getProductPriceInLira(p.price);
  let btn = canSell()?`<button class="btn-add-to-cart" onclick="addToCart(${p.id},'${branchId}',1)">➕ أضف للسلة</button>`:'';
  return `<div class="pc"><div class="pc-img">${p.image?`<img src="${p.image}">`:'<span>📦</span>'}</div><div class="pc-body"><div class="pc-name">${p.name}</div><div class="pc-price">${priceLira} ل.س</div><div class="pc-details">${p.category} | المتبقي: ${stock}</div>${btn}</div></div>`;
}
function renderStore(){ /* كما في السابق مع استخدام priceLira */ 
  let cont=document.getElementById('pStore');
  if(!cont) return;
  let availableBranches=getUserBranch()?branches.filter(b=>b.id===getUserBranch()):branches;
  let selectedBranch=localStorage.getItem('storeBranch')||(availableBranches[0]?.id||'oldtown');
  let branchCats=branchesData[selectedBranch]?.categories||[];
  let selectedDept=localStorage.getItem('storeDept')||'الكل';
  cont.innerHTML=`<div style="background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px;text-align:center"><h2>🏢 مجموعة غرزالدين التجارية</h2><p>نلبي كل احتياجاتك</p><div class="branch-buttons" id="branchButtons"></div><div class="branch-address" id="branchAddress"></div><div class="dept-buttons" id="deptButtons"></div><div class="search-box"><input id="storeSearch" placeholder="بحث"></div><div class="pg" id="storeGrid"></div></div>`;
  document.getElementById('branchButtons').innerHTML=availableBranches.map(b=>`<button class="branch-btn ${selectedBranch===b.id?'active':''}" data-branch="${b.id}">${b.name}</button>`).join('');
  document.querySelectorAll('#branchButtons .branch-btn').forEach(btn=>btn.addEventListener('click',()=>{ localStorage.setItem('storeBranch',btn.dataset.branch); renderStore(); }));
  let addrDiv=document.getElementById('branchAddress');
  let branchInfo=branches.find(b=>b.id===selectedBranch);
  addrDiv.innerHTML=branchInfo?`📍 ${branchInfo.address}`:'';
  let deptDiv=document.getElementById('deptButtons');
  deptDiv.innerHTML=`<button class="dept-btn ${selectedDept==='الكل'?'active':''}" data-dept="الكل">الكل</button>`+branchCats.map(c=>`<button class="dept-btn ${selectedDept===c?'active':''}" data-dept="${c}">${c}</button>`).join('');
  deptDiv.querySelectorAll('.dept-btn').forEach(btn=>btn.addEventListener('click',()=>{ localStorage.setItem('storeDept',btn.dataset.dept); renderStore(); }));
  let search=document.getElementById('storeSearch');
  const renderGrid=()=>{
    let query=search.value.toLowerCase();
    let filtered=products.filter(p=>(selectedDept==='الكل'||p.category===selectedDept) && (p.name.toLowerCase().includes(query)||p.category.toLowerCase().includes(query)) && branchCats.includes(p.category));
    filtered=filterProducts(filtered);
    let grid=document.getElementById('storeGrid');
    if(filtered.length===0) grid.innerHTML='<div class="empty">لا توجد منتجات</div>';
    else grid.innerHTML=filtered.map(p=>renderProductCard(p,selectedBranch)).join('');
  };
  search.addEventListener('input',renderGrid);
  renderGrid();
}

function renderInventory(){ /* نفس السابق مع تعديل عرض الأسعار بالليرة */ 
  let cont=document.getElementById('pInventory');
  if(!cont) return;
  if(!canSell()){ cont.innerHTML='<div class="empty">غير مصرح</div>'; return; }
  let canEdit=(currentUser.role==='مدير عام'||currentUser.role==='رئيس فرع');
  cont.innerHTML=`<div class="sec-hdr"><div class="sec-title">📦 المخزون</div>${canEdit?'<button class="btn btn-acc btn-sm" onclick="openProductModal()">+ منتج</button>':''}</div><div class="search-box"><input id="invSearch" placeholder="بحث"></div><div class="inv-grid" id="invGrid"></div>`;
  let search=document.getElementById('invSearch');
  const render=()=>{
    let query=search.value.toLowerCase();
    let filtered=products.filter(p=>p.name.toLowerCase().includes(query)||p.category.toLowerCase().includes(query));
    filtered=filterProducts(filtered);
    let grid=document.getElementById('invGrid');
    if(filtered.length===0) grid.innerHTML='<div class="empty">لا توجد نتائج</div>';
    else grid.innerHTML=filtered.map(p=>{
      let stockDisplay='';
      if(currentUser.role==='مدير عام') stockDisplay=`أول البلد:${p.stock.oldtown||0} القلعة:${p.stock.castle||0} السوق:${p.stock.souk||0}`;
      else if(currentUser.branchId) stockDisplay=`المتبقي: ${p.stock[currentUser.branchId]||0}`;
      else stockDisplay=`أول البلد:${p.stock.oldtown||0} القلعة:${p.stock.castle||0} السوق:${p.stock.souk||0}`;
      let fill=currentUser.branchId?((p.stock[currentUser.branchId]||0)/30)*100:(((p.stock.oldtown||0)+(p.stock.castle||0)+(p.stock.souk||0))/90)*100;
      return `<div class="inv-card"><div><b>${p.name}</b><br><small>${p.category}</small></div><div class="inv-bar"><div class="inv-fill" style="width:${fill}%; background:${fill<20?'red':'#22c55e'}"></div></div><div>${stockDisplay}</div><div>السعر: ${getProductPriceInLira(p.price)} ل.س</div>${canEdit?`<div><button class="btn btn-sm btn-ghost" onclick="editProduct(${p.id})">تعديل</button> <button class="btn btn-sm btn-red" onclick="deleteProduct(${p.id})">حذف</button></div>`:''}</div>`;
    }).join('');
  };
  search.addEventListener('input',render);
  render();
}
function openProductModal(prod=null){ /* كما هو مع تخزين السعر بالدولار */ 
  let modal=document.createElement('div'); modal.className='modal';
  modal.innerHTML=`<div class="modal-content"><h3>${prod?'تعديل':'إضافة'} منتج</h3>
    <div class="fg"><label>الاسم</label><input id="pName" value="${prod?.name||''}"></div>
    <div class="fg"><label>القسم</label><select id="pCat">${allCategories.map(c=>`<option ${prod?.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fg"><label>السعر (دولار)</label><input id="pPrice" type="number" value="${prod?.price||0}"></div>
    <div class="fg"><label>الوصف</label><input id="pDesc" value="${prod?.description||''}"></div>
    <div class="fg"><label>مخزون أول البلد</label><input id="pStockOld" type="number" value="${prod?.stock?.oldtown||0}"></div>
    <div class="fg"><label>مخزون القلعة</label><input id="pStockCastle" type="number" value="${prod?.stock?.castle||0}"></div>
    <div class="fg"><label>مخزون السوق</label><input id="pStockSouk" type="number" value="${prod?.stock?.souk||0}"></div>
    <div class="fg"><label>صورة</label><button type="button" id="uploadBtn" class="btn btn-ghost">رفع صورة</button><input type="hidden" id="pImage" value="${prod?.image||''}"><div id="imgPreview">${prod?.image?`<img src="${prod.image}" style="max-width:100px">`:''}</div></div>
    <div class="modal-actions"><button class="btn btn-acc" id="saveBtn">حفظ</button><button class="btn btn-red" id="closeBtn">إلغاء</button></div></div>`;
  document.body.appendChild(modal); modal.classList.add('active');
  document.getElementById('uploadBtn').onclick=()=>{
    let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange=e=>{ let file=e.target.files[0]; if(!file) return; let reader=new FileReader(); reader.onload=ev=>{ document.getElementById('pImage').value=ev.target.result; document.getElementById('imgPreview').innerHTML=`<img src="${ev.target.result}" style="max-width:100px">`; showNotification('تم رفع الصورة'); }; reader.readAsDataURL(file); };
    inp.click();
  };
  document.getElementById('saveBtn').onclick=()=>{
    let name=document.getElementById('pName').value, cat=document.getElementById('pCat').value, price=parseFloat(document.getElementById('pPrice').value), desc=document.getElementById('pDesc').value, old=parseInt(document.getElementById('pStockOld').value), castle=parseInt(document.getElementById('pStockCastle').value), souk=parseInt(document.getElementById('pStockSouk').value), image=document.getElementById('pImage').value;
    if(!name){ showNotification('اسم المنتج مطلوب'); return; }
    if(prod){ prod.name=name; prod.category=cat; prod.price=price; prod.description=desc; prod.stock={oldtown:old, castle:castle, souk:souk}; prod.image=image; }
    else { products.push({ id:Date.now(), name, category:cat, price, stock:{oldtown:old, castle:castle, souk:souk}, image, description:desc }); }
    saveAll(); renderAll(); modal.remove(); showNotification('تم الحفظ');
  };
  document.getElementById('closeBtn').onclick=()=>modal.remove();
}
function editProduct(id){ openProductModal(products.find(p=>p.id==id)); }
function deleteProduct(id){ if(confirm('حذف المنتج؟')){ products=products.filter(p=>p.id!=id); saveAll(); renderAll(); showNotification('تم الحذف'); } }
function renderWallet(){
  let cont=document.getElementById('pWallet');
  if(!cont) return;
  let branchTot={}, deptTot={};
  branches.forEach(b=>{ branchTot[b.id]={cash:0,credit:0}; });
  allCategories.forEach(c=>{ deptTot[c]={cash:0,credit:0}; });
  sales.forEach(s=>{ if(branchTot[s.branchId]) branchTot[s.branchId][s.paymentMethod]+=s.totalLira; if(deptTot[s.category]) deptTot[s.category][s.paymentMethod]+=s.totalLira; });
  let html=`<div class="sec-hdr"><div class="sec-title">💰 المحفظة (ل.س)</div></div><div class="mini-card"><table class="wallet-table"><thead><th>الفرع</th><th>كاش</th><th>دين</th><th>الإجمالي</th></thead><tbody>`;
  branches.forEach(b=>{ let c=branchTot[b.id].cash, d=branchTot[b.id].credit; html+=`<tr><td>${b.name}</td><td>${c}</td><td>${d}</td><td>${c+d}</td></tr>`; });
  html+=`</tbody></table></div><div class="mini-card"><table class="wallet-table"><thead><th>القسم</th><th>كاش</th><th>دين</th><th>الإجمالي</th></thead><tbody>`;
  allCategories.forEach(c=>{ let csh=deptTot[c].cash, cr=deptTot[c].credit; html+=`<tr><td>${c}</td><td>${csh}</td><td>${cr}</td><td>${csh+cr}</td></tr>`; });
  html+=`</tbody></table></div>`;
  cont.innerHTML=html;
}
function renderReports(){
  let cont=document.getElementById('pReports');
  if(!cont) return;
  let adminBtns=(currentUser.role==='مدير عام')?`<button class="btn btn-acc btn-sm" onclick="uploadCompanyLogo()">🖼️ شعار</button> <button class="btn btn-acc btn-sm" onclick="uploadFavicon()">🌐 أيقونة</button>`:'';

  applyReports();

function applyReports(){
  let branch=document.getElementById('repBranch')?.value||'all', dept=document.getElementById('repDept')?.value||'all';
  let filtered=[...sales];
  if(currentUser.branchId) filtered=filtered.filter(s=>s.branchId===currentUser.branchId);
  if(currentUser.dept) filtered=filtered.filter(s=>s.category===currentUser.dept);
  if(branch!=='all') filtered=filtered.filter(s=>s.branchId===branch);
  if(dept!=='all') filtered=filtered.filter(s=>s.category===dept);
  let today=new Date().toISOString().slice(0,10);
  let todaySales=filtered.filter(s=>s.dateOnly===today);
  let totalToday=todaySales.reduce((a,b)=>a+b.totalLira,0);
  let totalAll=filtered.reduce((a,b)=>a+b.totalLira,0);
  document.getElementById('repStats').innerHTML=`<div class="stats-row"><div class="stat"><div class="stat-val">${totalToday}</div><div>مبيعات اليوم (ل.س)</div></div><div class="stat"><div class="stat-val">${totalAll}</div><div>إجمالي المبيعات</div></div></div>`;
  let html=`<table class="report-table"><thead><th>التاريخ</th><th>الفرع</th><th>القسم</th><th>المنتج</th><th>الكمية</th><th>الإجمالي</th><th>الدفع</th><th>البائع</th></thead><tbody>`;
  if(filtered.length===0) html+=`<tr><td colspan="8">لا توجد مبيعات</td></tr>`;
  else filtered.slice(0,50).forEach(s=>{ html+=`<tr><td>${s.date}</td><td>${s.branchName}</td><td>${s.category}</td><td>${s.productName}</td><td>${s.quantity}</td><td>${s.totalLira}</td><td>${s.paymentMethod==='cash'?'كاش':'دين'}</td><td>${s.seller}</td></tr>`; });
  html+=`</tbody></table>`;
  document.getElementById('repTable').innerHTML=html;
}

function setActivePanel(pid){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
