<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="غرزالدين">
<meta name="application-name" content="غرزالدين">
<title>مجموعة غرزالدين التجارية</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏢%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" id="appleIcon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏢%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--card:#1e2330;--card2:#242838;--acc:#ff6b35;--gold:#f5c518;--grn:#22c55e;--red:#ef4444;--blu:#3b82f6;--pur:#a855f7;--txt:#f0f2ff;--t2:#8b92a8;--brd:#2a2f3e}
.day{--bg:#f0f4f8;--bg2:#e4eaf0;--bg3:#d8e0ea;--card:#fff;--card2:#f8fafc;--txt:#1a2030;--t2:#5a6478;--brd:#d0d8e4}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt)}
#A{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.scr{display:none;width:100%;height:100%}
.scr.v{display:flex;flex-direction:column}
#LS{background:var(--bg);align-items:center;justify-content:center;padding:16px;overflow-y:auto}

/* LOGIN */
.lc{background:var(--card);border-radius:20px;padding:20px 16px;width:100%;max-width:340px;border:1px solid var(--brd)}
.ll{text-align:center;margin-bottom:14px}
.li{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--acc),var(--gold));display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:7px;overflow:hidden}
.li img{width:100%;height:100%;object-fit:cover}
.ln{font-size:15px;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lt{display:flex;flex-wrap:wrap;gap:3px;background:var(--bg3);padding:3px;border-radius:10px;margin-bottom:11px}
.ltb{flex:1;min-width:52px;padding:5px 3px;border:none;background:transparent;color:var(--t2);font-family:inherit;font-size:9px;font-weight:700;border-radius:7px;cursor:pointer}
.ltb.a{background:var(--acc);color:#fff}
.lf{margin-bottom:8px}
.lf input{width:100%;padding:9px 11px;background:var(--bg3);border:1.5px solid var(--brd);border-radius:9px;color:var(--txt);font-family:inherit;font-size:12px;outline:none}
.lf input:focus{border-color:var(--acc)}
.lr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.lr input{width:14px;height:14px;accent-color:var(--acc)}
.lr label{font-size:10px;color:var(--t2);cursor:pointer}
.lb{width:100%;padding:11px;background:linear-gradient(135deg,var(--acc),#d94e1f);border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer}
.le{color:var(--red);font-size:10px;text-align:center;margin-top:5px;display:none}
.lh{margin-top:10px;padding:8px;background:var(--bg3);border-radius:8px;font-size:9px;color:var(--t2);line-height:2}

/* TOPBAR */
.tb{background:var(--card);border-bottom:1px solid var(--brd);padding:0 7px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbl{display:flex;align-items:center;gap:5px}
.ti{width:30px;height:30px;border-radius:7px;overflow:hidden;background:linear-gradient(135deg,var(--acc),var(--gold));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ti img{width:100%;height:100%;object-fit:cover}
.tn{font-size:12px;font-weight:900}
.tbr{display:flex;align-items:center;gap:3px}
.ib{width:29px;height:29px;border-radius:50%;border:none;background:var(--bg3);color:var(--txt);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;position:relative;flex-shrink:0}
.ib.wa{background:#25d366;color:#fff}.ib.fb{background:#1877f2;color:#fff}
.ib.ex{background:rgba(239,68,68,.15);color:var(--red)}.ib.dl{background:rgba(245,197,24,.15);color:var(--gold)}
.nb{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:12px;height:12px;font-size:7px;display:none;align-items:center;justify-content:center}

/* CONTENT */
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:9px;background:var(--bg)}

/* BOTTOM NAV */
.bn{background:var(--card);border-top:1px solid var(--brd);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;padding:0 2px}
.bn::-webkit-scrollbar{display:none}
.bni{display:flex;flex-direction:column;align-items:center;padding:5px 6px;border:none;background:transparent;color:var(--t2);font-family:inherit;font-size:9px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:46px;flex-shrink:0}
.bni .ic{font-size:15px;margin-bottom:1px}
.bni.a{color:var(--acc)}

/* PANELS */
.pnl{display:none}.pnl.v{display:block}

/* HERO */
.hero{background:linear-gradient(135deg,var(--card),var(--bg3));border-radius:13px;padding:12px;margin-bottom:10px;border:1px solid var(--brd)}
.hero h2{font-size:13px;font-weight:900;margin-bottom:2px}
.hero p{font-size:9px;color:var(--t2);margin-bottom:8px}
.hb{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.hbtn{padding:6px 10px;border-radius:8px;border:none;font-family:inherit;font-size:10px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:4px}
.hbtn.wa{background:#25d366;color:#fff}.hbtn.mp{background:var(--bg3);border:1px solid var(--brd);color:var(--txt)}.hbtn.fb{background:#1877f2;color:#fff}
.rb{background:var(--bg3);border-radius:8px;padding:7px;border:1px solid var(--brd)}
.rt{font-size:8px;color:var(--t2);font-weight:700;text-align:center;margin-bottom:5px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.rc{border-radius:7px;padding:6px;text-align:center}
.rc.b{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3)}
.rc.s{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.rl{font-size:8px;font-weight:700;margin-bottom:2px}
.rv{font-size:13px;font-weight:900}
.ru{font-size:7px;color:var(--t2)}

/* CHIPS */
.chips{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:4px 9px;border-radius:20px;border:1.5px solid var(--brd);background:var(--card);color:var(--t2);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.a{background:var(--acc);border-color:var(--acc);color:#fff}
.bts{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:6px}
.bts::-webkit-scrollbar{display:none}
.bbt{padding:4px 10px;border-radius:20px;border:1.5px solid var(--brd);background:var(--card);color:var(--t2);font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.bbt.a{background:var(--acc);border-color:var(--acc);color:#fff}
.baddr{background:var(--bg3);border-radius:7px;padding:5px 8px;font-size:9px;color:var(--gold);margin-bottom:7px}
.srch input{width:100%;padding:8px 10px;background:var(--card);border:1.5px solid var(--brd);border-radius:9px;color:var(--txt);font-family:inherit;font-size:11px;outline:none;margin-bottom:8px}
.srch input:focus{border-color:var(--acc)}

/* PRODUCT GRID */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.pc{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--brd)}
.pci{height:90px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pci img{width:100%;height:100%;object-fit:cover}
.pci .em{font-size:32px}
.pcb{padding:7px}
.pcn{font-size:10px;font-weight:800;margin-bottom:2px;line-height:1.3}
.pcc{font-size:8px;color:var(--t2);margin-bottom:2px}
.pcp{font-size:12px;font-weight:900;color:var(--acc);margin-bottom:2px}
.pcs{font-size:8px;color:var(--t2);margin-bottom:4px}
.badd{width:100%;padding:5px;background:var(--blu);border:none;border-radius:6px;color:#fff;font-family:inherit;font-size:9px;font-weight:800;cursor:pointer}
.bwa2{width:100%;padding:5px;background:#25d366;border:none;border-radius:6px;color:#fff;font-family:inherit;font-size:9px;font-weight:800;cursor:pointer;margin-top:3px}

/* CARD */
.cd{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:9px;margin-bottom:6px}
.cdt{font-size:12px;font-weight:800;margin-bottom:7px}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:8px}
.st{background:var(--card);border:1px solid var(--brd);border-radius:9px;padding:8px;text-align:center}
.sv{font-size:15px;font-weight:900;margin-bottom:1px}
.sl{font-size:8px;color:var(--t2)}

/* SEC HDR */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:5px}
.st2{font-size:13px;font-weight:800}

/* BUTTONS */
.btn{padding:5px 10px;border-radius:7px;border:none;font-family:inherit;font-size:10px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.bac{background:var(--acc);color:#fff}.bgn{background:var(--grn);color:#fff}
.brd{background:var(--red);color:#fff}.bgh{background:var(--bg3);border:1px solid var(--brd);color:var(--txt)}
.bgo{background:var(--gold);color:#1a1a1a}.bsm{padding:3px 7px;font-size:9px}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 6px;border-radius:20px;font-size:9px;font-weight:800}
.bg{background:rgba(34,197,94,.2);color:var(--grn)}.br2{background:rgba(239,68,68,.2);color:var(--red)}
.ba{background:rgba(255,107,53,.2);color:var(--acc)}.bb{background:rgba(59,130,246,.2);color:var(--blu)}
.bp{background:rgba(168,85,247,.2);color:var(--pur)}.bgo2{background:rgba(245,197,24,.2);color:var(--gold)}

/* INV BAR */
.ib2{background:var(--bg3);border-radius:3px;height:4px;overflow:hidden;margin:3px 0}
.if2{height:100%;border-radius:3px}

/* CART */
.ci{background:var(--bg3);border-radius:9px;padding:6px;margin-bottom:5px;display:flex;align-items:center;gap:5px;font-size:10px}
.cq{width:38px;padding:3px;background:var(--bg);border:1px solid var(--brd);border-radius:5px;color:var(--txt);text-align:center;font-family:inherit;font-size:10px}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:440px;font-size:9px}
th{background:var(--bg3);padding:6px;text-align:right;color:var(--t2);font-weight:800;border-bottom:1px solid var(--brd);white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--brd);vertical-align:middle}

/* EMP */
.ec{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:9px;margin-bottom:6px}
.et{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.ea{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--gold));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;justify-content:center}
.ov.v{display:flex}
.mb{background:var(--card2);border-radius:18px 18px 0 0;padding:14px 12px 24px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;border:1px solid var(--brd)}
.md{width:32px;height:3px;background:var(--brd);border-radius:2px;margin:0 auto 12px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mt{font-size:13px;font-weight:900}
.mc{width:25px;height:25px;background:var(--bg3);border:none;border-radius:6px;color:var(--t2);cursor:pointer;font-size:11px}
.fg{margin-bottom:8px}
.fg label{display:block;font-size:9px;font-weight:800;color:var(--t2);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px;background:var(--bg3);border:1.5px solid var(--brd);border-radius:8px;color:var(--txt);font-family:inherit;font-size:11px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--acc)}
.fg select option{background:var(--bg3)}
.mbtns{display:flex;gap:6px;margin-top:11px}
.mbtns .btn{flex:1;justify-content:center;padding:10px}
.iupa{display:flex;align-items:center;gap:7px;margin-top:4px}
.iprev{width:48px;height:48px;background:var(--bg3);border:2px dashed var(--brd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;flex-shrink:0}
.iprev img{width:100%;height:100%;object-fit:cover}

/* TOAST */
.toast{position:fixed;bottom:66px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--card2);border:1px solid var(--brd);color:var(--txt);padding:7px 13px;border-radius:9px;font-size:10px;font-weight:700;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.v{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:28px 12px;color:var(--t2)}
.ei{font-size:36px;margin-bottom:6px}
</style>
</head>
<body>
<div id="A">

<!-- LOGIN -->
<div id="LS" class="scr v">
<div class="lc">
  <div class="ll">
    <div class="li" id="LL">🏢</div>
    <div class="ln">مجموعة غرزالدين</div>
  </div>
  <div class="lt">
    <button class="ltb a" onclick="setTab('admin',this)">مدير عام</button>
    <button class="ltb" onclick="setTab('brMgr',this)">رئيس فرع</button>
    <button class="ltb" onclick="setTab('deptMgr',this)">رئيس قسم</button>
    <button class="ltb" onclick="setTab('emp',this)">موظف</button>
    <button class="ltb" onclick="setTab('guest',this)">زبون</button>
  </div>
  <div class="lf"><input id="lU" placeholder="اسم المستخدم" autocomplete="username"></div>
  <div class="lf" id="lPW"><input id="lP" type="password" placeholder="كلمة المرور" onkeypress="if(event.key==='Enter')doLogin()"></div>
  <div class="lr"><input type="checkbox" id="remMe"><label for="remMe">تذكّرني</label></div>
  <button class="lb" onclick="doLogin()">دخول ←</button>
  <div class="le" id="lErr">❌ بيانات خاطئة</div>
  <div class="lh">admin/admin123 | oldtown/123 | castle/123 | souk/123 | emp1/emp123</div>
</div>
</div>

<!-- APP -->
<div id="AS" class="scr">
  <div class="tb">
    <div class="tbl">
      <div class="ti" id="TI">🏢</div>
      <div class="tn" id="storeName">غرزالدين</div>
    </div>
    <div class="tbr">
      <button class="ib wa" onclick="openWA()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.533 5.845L.057 23.492c-.083.334.239.632.568.527l5.845-1.867A11.948 11.948 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg></button>
      <button class="ib fb" onclick="openFB()"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></button>
      <button class="ib" onclick="openGPS()">📍</button>
      <button class="ib" onclick="openMsgModal()" id="msgBtn">💬<span class="nb" id="msgBdg">0</span></button>
      <button class="ib dl" id="rateBtn" onclick="editRate()">💵</button>
      <button class="ib" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="ib ex" onclick="doLogout()">🚪</button>
    </div>
  </div>
  <div class="cnt">
    <div class="pnl v" id="pStore"></div>
    <div class="pnl" id="pCart"></div>
    <div class="pnl" id="pInv"></div>
    <div class="pnl" id="pRep"></div>
    <div class="pnl" id="pWallet"></div>
    <div class="pnl" id="pDebt"></div>
    <div class="pnl" id="pEmp"></div>
    <div class="pnl" id="pSet"></div>
  </div>
  <div class="bn" id="bnav">
    <button class="bni a" data-p="pStore"><span class="ic">🏠</span>المتجر</button>
    <button class="bni" data-p="pCart" id="nCart"><span class="ic">🛒</span>السلة<span class="nb" id="cBdg">0</span></button>
    <button class="bni" data-p="pInv" id="nInv"><span class="ic">📦</span>المخزون</button>
    <button class="bni" data-p="pRep" id="nRep"><span class="ic">📊</span>التقارير</button>
    <button class="bni" data-p="pWallet" id="nWal"><span class="ic">💰</span>المحفظة</button>
    <button class="bni" data-p="pDebt" id="nDebt"><span class="ic">📒</span>الديون</button>
    <button class="bni" data-p="pEmp" id="nEmp"><span class="ic">👥</span>الموظفون</button>
    <button class="bni" data-p="pSet" id="nSet"><span class="ic">⚙️</span>الإعدادات</button>
  </div>
</div>
</div>

<!-- MODALS -->
<div class="ov" id="mProd"><div class="mb">
  <div class="md"></div>
  <div class="mh"><div class="mt" id="mPT">منتج</div><button class="mc" onclick="co('mProd')">✕</button></div>
  <div class="fg"><label>اسم المنتج</label><input id="pN"></div>
  <div class="fg"><label>القسم</label><select id="pCat"></select></div>
  <div id="adminPriceFields">
    <div class="fg"><label>سعر البيع (ل.س)</label><input id="pPrice" type="number"></div>
    <div class="fg"><label>سعر التكلفة - رأس المال (ل.س)</label><input id="pCost" type="number" value="0"></div>
    <div class="fg"><label>طريقة البيع</label>
      <select id="pUnit"><option value="piece">بالقطعة</option><option value="kg">بالكيلو (كغ)</option><option value="gram">بالغرام (غ)</option><option value="liter">باللتر</option></select>
    </div>
  </div>
  <div class="fg"><label>الوصف</label><input id="pDesc"></div>
  <div class="fg"><label id="stOLbl">مخزون أول البلد</label><input id="pStO" type="number" value="0"></div>
  <div id="otherStockFields">
    <div class="fg"><label>مخزون القلعة</label><input id="pStC" type="number" value="0"></div>
    <div class="fg"><label>مخزون السوق - مواد غذائية</label><input id="pStS" type="number" value="0"></div>
    <div class="fg"><label>مخزون السوق - ملابس</label><input id="pStSC" type="number" value="0"></div>

// ══════ WEIGHT MODAL (Enter Amount → Get Weight) ══════
function openWtModal(prodId,branchId){
  wtProd=prods.find(p=>p.id==prodId);wtBranch=branchId;if(!wtProd)return;
  const ul=wtProd.unit==='kg'?'كيلوغرام':'غرام';
  document.getElementById('mWtT').textContent=`⚖️ ${wtProd.name}`;
  document.getElementById('wtPriceDisplay').textContent=`${wtProd.price.toLocaleString('ar-SY')} ل.س / ${ul}`;
  document.getElementById('wtAmount').value='';
  document.getElementById('wtQty').value='';
  document.getElementById('wtCalcResult').style.display='none';
  document.getElementById('wtFinalTotal').textContent='';
  document.getElementById('mWt').classList.add('v');
}

function calcWtFromAmount(){
  const amount=parseFloat(document.getElementById('wtAmount').value)||0;
  if(!amount||!wtProd){document.getElementById('wtCalcResult').style.display='none';return;}
  const qty=amount/wtProd.price;
  const ul=wtProd.unit==='kg'?'كغ':'غ';
  document.getElementById('wtWeightResult').textContent=`${qty.toFixed(3)} ${ul}`;
  document.getElementById('wtCalcResult').style.display='block';
  document.getElementById('wtQty').value=qty.toFixed(3);
  document.getElementById('wtFinalTotal').textContent=`الإجمالي: ${amount.toLocaleString('ar-SY')} ل.س`;
}

function calcWtFromQty(){
  const qty=parseFloat(document.getElementById('wtQty').value)||0;
  if(!qty||!wtProd){document.getElementById('wtFinalTotal').textContent='';return;}
  const total=qty*wtProd.price;
  document.getElementById('wtFinalTotal').textContent=`الإجمالي: ${total.toLocaleString('ar-SY')} ل.س`;
}

function confirmWt(){
  const qty=parseFloat(document.getElementById('wtQty').value);
  if(!qty||qty<=0){toast('⚠️ أدخل المبلغ أو الكمية','e');return;}
  const st=wtProd.stock[wtBranch]||0;
  if(qty>st){toast(`❌ المتبقي: ${st} ${wtProd.unit==='kg'?'كغ':'غ'}`,'e');return;}
  const ex=cart.find(i=>i.prodId==wtProd.id&&i.branchId==wtBranch);
  if(ex)ex.qty+=qty;else cart.push({prodId:wtProd.id,branchId:wtBranch,name:wtProd.name,price:wtProd.price,cost:wtProd.cost||0,cat:wtProd.cat,qty,unit:wtProd.unit});
  localStorage.setItem('gz_c',JSON.stringify(cart));updateCartBdg();
  toast(`✅ ${wtProd.name} - ${qty} ${wtProd.unit==='kg'?'كغ':'غ'}`);co('mWt');
}

// ══════ CART ══════
function addCart(prodId,branchId,qty=1){
  const prod=prods.find(p=>p.id==prodId);if(!prod)return;
  const st=prod.stock[branchId]||0;if(st<qty){toast('❌ غير متوفر','e');return;}
  const ex=cart.find(i=>i.prodId==prodId&&i.branchId==branchId);
  if(ex){if(ex.qty+qty>st){toast('❌ الكمية غير كافية','e');return;}ex.qty+=qty;}
  else cart.push({prodId,branchId,name:prod.name,price:prod.price,cost:prod.cost||0,cat:prod.cat,qty,unit:prod.unit||'piece'});
  localStorage.setItem('gz_c',JSON.stringify(cart));updateCartBdg();toast(`✅ ${prod.name}`);
}
function updateCartBdg(){const t=cart.reduce((s,i)=>s+i.qty,0);const b=document.getElementById('cBdg');if(b){b.textContent=Math.round(t);b.style.display=t>0?'flex':'none';}}
function renderCart(){
  const el=document.getElementById('pCart');
  if(!cart.length){el.innerHTML='<div class="empty"><div class="ei">🛒</div><p>السلة فارغة</p></div>';return;}
  let tot=0;
  const items=cart.map((item,i)=>{const it=item.price*item.qty;tot+=it;const ul=item.unit==='kg'?'كغ':item.unit==='gram'?'غ':item.unit==='liter'?'ل':'';return `<div class="ci"><div style="flex:1"><div style="font-weight:800;font-size:11px">${item.name}</div><div style="font-size:8px;color:var(--t2)">${BC[item.branchId]?.name||item.branchId}</div></div><input class="cq" type="number" min="0.01" step="${item.unit==='piece'?1:0.1}" value="${item.qty}" onchange="updQty(${i},this.value)"><span style="font-size:8px;color:var(--t2)">${ul}</span><div style="font-weight:800;font-size:10px;color:var(--acc)">${it.toLocaleString('ar-SY')}</div><button class="btn brd bsm" onclick="rmCart(${i})">✕</button></div>`;}).join('');
  el.innerHTML=`<div class="sh"><div class="st2">🛒 السلة</div></div>${items}<div style="background:var(--acc);border-radius:9px;padding:9px;text-align:center;margin:8px 0;font-weight:900;font-size:13px">الإجمالي: ${tot.toLocaleString('ar-SY')} ل.س</div><div style="display:flex;gap:5px"><button class="btn bgn" style="flex:1;justify-content:center;padding:10px" onclick="checkout('cash')">💵 كاش</button><button class="btn bgh" style="flex:1;justify-content:center;padding:10px" onclick="checkout('credit')">📝 دين</button></div>`;
}
function updQty(i,v){v=parseFloat(v);if(!v||v<=0){rmCart(i);return;}const item=cart[i];const prod=prods.find(p=>p.id==item.prodId);if(prod&&(prod.stock[item.branchId]||0)>=v){cart[i].qty=v;localStorage.setItem('gz_c',JSON.stringify(cart));updateCartBdg();renderCart();}else toast('❌ غير كافية','e');}
function rmCart(i){cart.splice(i,1);localStorage.setItem('gz_c',JSON.stringify(cart));updateCartBdg();renderCart();}
function checkout(method){
  if(!cart.length){toast('السلة فارغة','e');return;}
  for(const item of cart){const p=prods.find(x=>x.id==item.prodId);if(!p||(p.stock[item.branchId]||0)<item.qty){toast(`❌ ${item.name} غير متوفر`,'e');return;}}
  if(method==='credit'){openDebtFromCart();return;}
  processCheckout(method,'');
}
function processCheckout(method,debtorName){
  for(const item of cart){
    const prod=prods.find(p=>p.id==item.prodId);
    prod.stock[item.branchId]=(prod.stock[item.branchId]||0)-item.qty;
    const total=item.price*item.qty;const profit=(item.price-item.cost)*item.qty;
    const isPartner=isPartnerSale(item.branchId,item.cat);
    const myProfit=isPartner?(profit*partnerShare/100):profit;
    sales.unshift({id:Date.now()+Math.random(),branchId:item.branchId,branchName:BC[item.branchId]?.name||item.branchId,prodId:item.prodId,prodName:item.name,cat:item.cat,qty:item.qty,unit:item.unit||'piece',price:item.price,cost:item.cost||0,total,profit,isPartner,myProfit,date:new Date().toLocaleString(),dateOnly:new Date().toISOString().slice(0,10),seller:me.username,method,debtorName});
    if((prod.stock[item.branchId]||0)<5)msgs.push({from:me.username,to:'admin',text:`🔔 ${prod.name} في ${BC[item.branchId]?.name} أصبح ${prod.stock[item.branchId]||0} فقط`,time:new Date().toLocaleString(),read:false});
  }
  save();cart=[];localStorage.setItem('gz_c',JSON.stringify(cart));updateCartBdg();toast(`✅ تم البيع (${method==='cash'?'كاش':'دين'})${debtorName?' - '+debtorName:''}`);renderCart();
}
function openDebtFromCart(){
  const tot=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const det=cart.map(i=>`${i.name}(${i.qty})`).join('،');
  const brId=cart[0]?.branchId||me.branchId||'oldtown';
  const brSel=document.getElementById('dBr');
  brSel.innerHTML=Object.entries(BC).map(([id,v])=>`<option value="${id}" ${id===brId?'selected':''}>${v.name}</option>`).join('');
  document.getElementById('dN').value='';document.getElementById('dPh').value='';
  document.getElementById('dAm').value=Math.round(tot);document.getElementById('dDet').value=det;
  document.getElementById('mDebt').classList.add('v');
}

  }).join('');
}

function renderRep(){

  const branchOptions=isAdmin?`<option value="all">جميع الفروع</option>${Object.entries(BC).map(([id,v])=>`<option value="${id}">${v.name}</option>`).join('')}`:Object.entries(BC).filter(([id])=>me.branchId?id===me.branchId:true).map(([id,v])=>`<option value="${id}">${v.name}</option>`).join('');

  applyRep();
}
function applyRep(){
  let f=[...sales];
  if(me.branchId)f=f.filter(s=>s.branchId===me.branchId);
  const br=document.getElementById('repBr')?.value;const cat=document.getElementById('repCat')?.value;
  if(br&&br!=='all')f=f.filter(s=>s.branchId===br);
  if(cat&&cat!=='all')f=f.filter(s=>s.cat===cat);
  const today=new Date().toISOString().slice(0,10);
  const totDay=f.filter(s=>s.dateOnly===today).reduce((a,b)=>a+b.total,0);
  const totAll=f.reduce((a,b)=>a+b.total,0);
  const profAll=f.reduce((a,b)=>a+(b.profit||0),0);
  const myProfAll=f.reduce((a,b)=>a+(b.myProfit||b.profit||0),0);

    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:7px;padding:6px;text-align:center"><div style="color:var(--t2);font-size:8px">💸 المسحوب</div><div style="font-weight:800;color:var(--red)">${b.totOut.toLocaleString()}</div></div>
    <div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:7px;padding:6px;text-align:center"><div style="color:var(--t2);font-size:8px">🏦 المتبقي</div><div style="font-weight:800;color:var(--grn)">${b.rem.toLocaleString()}</div></div>
    <div style="background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.2);border-radius:7px;padding:6px;text-align:center"><div style="color:var(--t2);font-size:8px">📈 إجمالي الربح</div><div style="font-weight:800;color:var(--gold)">${b.profit.toLocaleString()}</div></div>
    <div style="background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:7px;padding:6px;text-align:center"><div style="color:var(--t2);font-size:8px">💎 حصتي</div><div style="font-weight:800;color:var(--pur)">${b.myProfit.toLocaleString()}</div></div>
  </div></div>`).join('')}

function saveDebt(){

  co('mDebt');if(document.getElementById('pDebt').classList.contains('v'))renderDebt();
}
function renderDebt(){
  const el=document.getElementById('pDebt');
  el.innerHTML=`<div class="sh"><div class="st2">📒 دفتر الديون</div><button class="btn bac bsm" onclick="openDebtD()">➕ دين</button></div><div style="display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap"><input id="dSrch" placeholder="🔍 بحث..." oninput="filterD()" style="flex:1;padding:6px;background:var(--card);border:1.5px solid var(--brd);border-radius:8px;color:var(--txt);font-family:inherit;font-size:10px;outline:none;min-width:100px"><select id="dFilt" onchange="filterD()" style="padding:6px;background:var(--card);border:1.5px solid var(--brd);border-radius:8px;color:var(--txt);font-family:inherit;font-size:10px;outline:none"><option value="all">الكل</option><option value="unpaid">غير مسدد</option><option value="paid">مسدد</option></select></div><div id="dStats"></div><div id="dList"></div>`;
  filterD();
}
function filterD(){
  const q=(document.getElementById('dSrch')?.value||'').toLowerCase();const filt=document.getElementById('dFilt')?.value||'all';
  const isAdmin=me.role==='مدير عام';
  let items=[...debts];
  if(!isAdmin&&me.branchId)items=items.filter(d=>d.branchId===me.branchId);
  if(filt==='unpaid')items=items.filter(d=>!d.paid);
  if(filt==='paid')items=items.filter(d=>d.paid);
  if(q)items=items.filter(d=>d.name.toLowerCase().includes(q)||String(d.amount).includes(q)||(d.details||'').toLowerCase().includes(q)||(d.phone||'').includes(q));
  const tot=items.filter(d=>!d.paid).reduce((s,d)=>s+d.amount,0);const totP=items.filter(d=>d.paid).reduce((s,d)=>s+d.amount,0);
  document.getElementById('dStats').innerHTML=`<div class="sg" style="margin-bottom:7px"><div class="st"><div class="sv" style="color:var(--red)">${tot.toLocaleString()}</div><div class="sl">💸 الديون المتبقية</div></div><div class="st"><div class="sv" style="color:var(--grn)">${totP.toLocaleString()}</div><div class="sl">✅ المسدد</div></div></div>`;
  const dl=document.getElementById('dList');
  if(!items.length){dl.innerHTML='<div class="empty"><div class="ei">📒</div><p>لا توجد ديون</p></div>';return;}
  dl.innerHTML=items.map(d=>`<div class="cd" style="border-right:4px solid ${d.paid?'var(--grn)':'var(--red)'}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px"><div><div style="font-size:12px;font-weight:900">${d.name}</div>${d.phone?`<a href="tel:${d.phone}" style="font-size:9px;color:var(--blu);text-decoration:none">📞 ${d.phone}</a>`:''}</div><div style="text-align:left"><div style="font-size:13px;font-weight:900;color:${d.paid?'var(--grn)':'var(--red)'}">${d.amount.toLocaleString()}</div><div style="font-size:7px;color:var(--t2)">ل.س</div></div></div>${d.details?`<div style="font-size:9px;color:var(--t2);margin-bottom:3px">📦 ${d.details}</div>`:''}<div style="font-size:8px;color:var(--t2);margin-bottom:6px">🏢 ${d.branchName} | 📅 ${d.date}</div><div style="display:flex;gap:4px;flex-wrap:wrap">${!d.paid?`<button class="btn bgn bsm" onclick="markPaid(${d.id})">✅ سدّد</button>`:'<span class="bdg bg">✅ مسدد</span>'}${d.phone?`<button class="btn bsm" style="background:#25d366;color:#fff" onclick="waDebt('${d.phone}','${d.name}',${d.amount})">💬</button>`:''}<button class="btn brd bsm" onclick="delDebt(${d.id})">🗑️</button></div></div>`).join('');
}
function openDebtD(){const brSel=document.getElementById('dBr');brSel.innerHTML=Object.entries(BC).map(([id,v])=>`<option value="${id}" ${me.branchId===id?'selected':''}>${v.name}</option>`).join('');['dN','dPh','dDet'].forEach(f=>document.getElementById(f).value='');document.getElementById('dAm').value='';document.getElementById('mDebt').classList.add('v');}
function markPaid(id){const d=debts.find(x=>x.id===id);if(d){d.paid=true;save();filterD();toast('✅ تم التسديد');}}
function delDebt(id){if(confirm('حذف؟')){debts=debts.filter(d=>d.id!=id);save();filterD();toast('🗑️ تم');}}
function waDebt(phone,name,amount){window.open(`https://wa.me/+${phone.replace(/\D/g,'')}?text=${encodeURIComponent(`السلام عليكم ${name}، يرجى تسديد مبلغ ${amount.toLocaleString()} ل.س. شكراً - ${storeName}`)}`,'_blank')}

function openUserModal(id){
  document.getElementById('mUT').textContent=id?'✏️ تعديل مستخدم':'➕ إضافة مستخدم';
  document.getElementById('uB').innerHTML=Object.entries(BC).map(([id,v])=>`<option value="${id}">${v.name}</option>`).join('');

  if(id){const u=users.find(x=>x.id==id);document.getElementById('uN').value=u.name;document.getElementById('uU').value=u.username;document.getElementById('uP').value=u.password;document.getElementById('uR').value=u.role;if(u.branchId)document.getElementById('uB').value=u.branchId;if(u.dept)document.getElementById('uD').value=u.dept;document.getElementById('mUser').dataset.eid=id;}

function updUF(){const r=document.getElementById('uR').value;document.getElementById('uBF').style.display=(r==='رئيس فرع'||r==='موظف')?'block':'none';document.getElementById('uDF').style.display=(r==='رئيس قسم')?'block':'none';}
function saveUser(){
  const name=document.getElementById('uN').value.trim();const username=document.getElementById('uU').value.trim();const password=document.getElementById('uP').value;const role=document.getElementById('uR').value;
  const branchId=(role==='رئيس فرع'||role==='موظف')?document.getElementById('uB').value:null;const dept=role==='رئيس قسم'?document.getElementById('uD').value:null;
  if(!name||!username||!password){toast('⚠️ الحقول مطلوبة','e');return;}
  const eid=document.getElementById('mUser').dataset.eid;
  if(eid){const u=users.find(x=>x.id==eid);u.name=name;u.username=username;u.password=password;u.role=role;u.branchId=branchId;u.dept=dept;toast('✅ تم التعديل');}
  else{if(users.find(u=>u.username===username)){toast('❌ اسم موجود','e');return;}users.push({id:nextUId++,name,username,password,role,branchId,dept});toast('✅ تمت الإضافة');}
  save();co('mUser');renderEmp();
}
function delUser(id){if(confirm('حذف؟')){users=users.filter(u=>u.id!=id);save();renderEmp();toast('🗑️ تم');}}

function openMsgModal(){
  document.getElementById('msgTo').innerHTML=users.filter(u=>u.username!==me.username).map(u=>`<option value="${u.username}">${u.name}</option>`).join('');
  renderChat();msgs.filter(m=>m.to===me.username&&!m.read).forEach(m=>m.read=true);save();updateMsgBdg();document.getElementById('mMsg').classList.add('v');
}
function renderChat(){const list=document.getElementById('chatList');const myMsgs=msgs.filter(m=>m.from===me.username||m.to===me.username);list.innerHTML=myMsgs.map(m=>`<div style="background:var(--bg3);border-radius:7px;padding:6px;margin-bottom:4px"><div style="font-size:9px;font-weight:800;color:var(--acc)">${m.from===me.username?'أنت':users.find(u=>u.username===m.from)?.name||m.from}</div><div style="font-size:10px;margin:2px 0">${m.text}</div><div style="font-size:7px;color:var(--t2)">${m.time}</div></div>`).join('')||'<div class="empty"><p>لا توجد رسائل</p></div>';list.scrollTop=list.scrollHeight;}
function sendMsg(){const to=document.getElementById('msgTo').value;const text=document.getElementById('msgTxt').value.trim();if(!text){toast('⚠️ اكتب رسالة','e');return;}msgs.push({from:me.username,to,text,time:new Date().toLocaleString(),read:false});save();document.getElementById('msgTxt').value='';renderChat();updateMsgBdg();toast('✅ تم');}
function updateMsgBdg(){const n=msgs.filter(m=>m.to===me?.username&&!m.read).length;const b=document.getElementById('msgBdg');if(b){b.textContent=n;b.style.display=n>0?'flex':'none';}}

// ══════ UTILS ══════
function openWA(){window.open(`https://wa.me/${PHONE_WA}?text=${encodeURIComponent('مرحباً 👋، أريد الاستفسار عن منتجاتكم')}`,'_blank')}
function openGPS(){window.open(`https://www.google.com/maps?q=${GPS_LAT},${GPS_LNG}`,'_blank')}
function co(id){document.getElementById(id).classList.remove('v')}
function toast(msg,type='k'){clearTimeout(toastT);const t=document.getElementById('toast');t.textContent=msg;t.style.background=type==='e'?'var(--red)':'var(--grn)';t.classList.add('v');toastT=setTimeout(()=>t.classList.remove('v'),2500);}

document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('v')}));
updateCartBdg();
// Apply logos if saved
if(logo)updateLogos();
</script>
</body>
</html>
